<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" fill="none" role="img" aria-label="Engineering">
  <g stroke-width="3" stroke-linecap="round">
    <ellipse cx="48" cy="48" rx="33" ry="13" stroke="#6f78d6">
      <animateTransform attributeName="transform" type="rotate" from="0 48 48" to="360 48 48" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="48" cy="48" rx="33" ry="13" stroke="#4aa6e0">
      <animateTransform attributeName="transform" type="rotate" from="60 48 48" to="420 48 48" dur="7.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="48" cy="48" rx="33" ry="13" stroke="#6f78d6" opacity=".55">
      <animateTransform attributeName="transform" type="rotate" from="120 48 48" to="480 48 48" dur="13s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <circle cx="48" cy="48" r="5" fill="#aeb6ec">
    <animate attributeName="r" values="4;6.5;4" dur="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>
