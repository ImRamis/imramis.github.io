<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" fill="none" role="img" aria-label="Everything">
  <!-- one white beam refracts into the four discipline colours -->
  <line x1="8" y1="48" x2="40" y2="48" stroke="#eaf6ff" stroke-width="3" stroke-linecap="round">
    <animate attributeName="opacity" values=".5;1;.5" dur="2.4s" repeatCount="indefinite"/>
  </line>
  <g stroke-width="3" stroke-linecap="round" opacity=".95">
    <line x1="56" y1="49" x2="88" y2="34" stroke="#e0556d"/>
    <line x1="57" y1="51" x2="88" y2="48" stroke="#e0ad42"/>
    <line x1="57" y1="53" x2="88" y2="58" stroke="#2fb389"/>
    <line x1="56" y1="55" x2="88" y2="70" stroke="#6f78d6"/>
  </g>
  <!-- prism -->
  <path d="M48 22 L66 58 L30 58 Z" stroke="#5cc6dd" stroke-width="3" fill="rgba(130,120,217,.14)" stroke-linejoin="round">
    <animateTransform attributeName="transform" type="rotate" values="-5 48 46; 5 48 46; -5 48 46" dur="6s" repeatCount="indefinite"/>
  </path>
  <circle cx="48" cy="45" r="3.2" fill="#ffffff"><animate attributeName="opacity" values=".6;1;.6" dur="2s" repeatCount="indefinite"/></circle>
</svg>
