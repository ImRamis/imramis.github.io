  <text x="186" y="178" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff">Color tokens</text>
  <g>
    <rect x="186" y="190" width="56" height="56" rx="12" fill="#fb7185"/><rect x="250" y="190" width="56" height="56" rx="12" fill="#fbbf24"/>
    <rect x="314" y="190" width="56" height="56" rx="12" fill="#34d399"/><rect x="378" y="190" width="56" height="56" rx="12" fill="#6ee7ff"/>
    <rect x="442" y="190" width="56" height="56" rx="12" fill="#818cf8"/><rect x="506" y="190" width="56" height="56" rx="12" fill="#c084fc"/>
  </g>
