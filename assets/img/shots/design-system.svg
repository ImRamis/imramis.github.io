<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Design system component library UI">
  <defs>
    <linearGradient id="ds-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1b1430"/><stop offset="1" stop-color="#0e0a1c"/></linearGradient>
    <linearGradient id="ds-ac" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fb7185"/><stop offset="1" stop-color="#fbbf24"/></linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#ds-bg)"/>
  <rect x="0" y="0" width="800" height="40" rx="16" fill="#221a3a"/><rect x="0" y="24" width="800" height="16" fill="#221a3a"/>
  <circle cx="22" cy="20" r="5" fill="#ff5f57"/><circle cx="40" cy="20" r="5" fill="#febc2e"/><circle cx="58" cy="20" r="5" fill="#28c840"/>
