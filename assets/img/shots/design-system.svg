    <circle cx="604" cy="138" r="5" fill="#34d399"/><text x="618" y="142" fill="#b3aac4">contrast AA pass</text>
    <circle cx="604" cy="164" r="5" fill="#34d399"/><text x="618" y="168" fill="#b3aac4">focus order valid</text>
  </g>
  <rect x="598" y="190" width="170" height="120" rx="10" fill="#0e0a1c"/>
  <polyline points="610,290 640,250 670,268 700,224 730,240 758,210" fill="none" stroke="url(#ds-ac)" stroke-width="3"/>
  <rect x="598" y="326" width="170" height="42" rx="9" fill="url(#ds-ac)" opacity=".18"/><text x="612" y="352" font-family="monospace" font-size="11" fill="#fbbf24">60+ components</text>
  <rect x="598" y="380" width="170" height="42" rx="9" fill="#ffffff0a"/><text x="612" y="406" font-family="monospace" font-size="11" fill="#b3aac4">tokens → Figma sync</text>
