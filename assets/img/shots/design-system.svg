  <rect x="582" y="56" width="202" height="428" rx="12" fill="#ffffff0a"/>
  <text x="598" y="84" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Storybook · a11y</text>
  <g font-family="sans-serif" font-size="11">
