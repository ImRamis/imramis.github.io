  <rect x="318" y="100" width="120" height="40" rx="20" fill="none" stroke="#fb7185" stroke-width="1.5"/><text x="378" y="125" font-family="sans-serif" font-size="13" fill="#fb7185" text-anchor="middle">Ghost</text>
  <rect x="450" y="100" width="120" height="40" rx="20" fill="#ffffff14"/><text x="510" y="125" font-family="sans-serif" font-size="13" fill="#cfc8dd" text-anchor="middle">Subtle</text>
