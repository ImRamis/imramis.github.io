    <text x="36" y="147">Inputs</text><text x="36" y="173">Toasts</text><text x="36" y="199">Modals</text>
    <text x="36" y="225">Tables</text><text x="36" y="251">Tabs</text><text x="36" y="277">Tokens</text><text x="36" y="303">Charts</text>
