  <rect x="186" y="266" width="180" height="120" rx="12" fill="#ffffff0a" stroke="#ffffff1a"/>
  <rect x="202" y="282" width="40" height="40" rx="10" fill="url(#ds-ac)" opacity=".3"/><rect x="202" y="334" width="120" height="9" rx="4" fill="#cfc8dd"/><rect x="202" y="352" width="90" height="8" rx="4" fill="#6b6480"/>
  <rect x="382" y="266" width="180" height="120" rx="12" fill="#ffffff0a" stroke="#ffffff1a"/>
