<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="SaaS marketing landing page UI">
  <defs>
    <linearGradient id="sl-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#100a22"/><stop offset="1" stop-color="#0a0716"/></linearGradient>
    <linearGradient id="sl-ac" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#c084fc"/><stop offset="1" stop-color="#f472b6"/></linearGradient>
    <radialGradient id="sl-glow" cx="0.5" cy="0" r="0.8"><stop offset="0" stop-color="#c084fc" stop-opacity=".3"/><stop offset="1" stop-color="#c084fc" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#sl-bg)"/>
  <rect width="800" height="260" fill="url(#sl-glow)"/>
  <!-- nav -->
  <rect x="24" y="24" width="28" height="28" rx="9" fill="url(#sl-ac)"/>
  <g font-family="sans-serif" font-size="12" fill="#b8add0"><text x="64" y="43">Product</text><text x="140" y="43">Pricing</text><text x="212" y="43">Docs</text></g>
  <rect x="676" y="24" width="100" height="32" rx="16" fill="url(#sl-ac)"/><text x="726" y="45" font-family="sans-serif" font-size="12" font-weight="700" fill="#100a22" text-anchor="middle">Start free</text>
  <!-- hero -->
  <rect x="280" y="92" width="240" height="22" rx="11" fill="#ffffff12"/><text x="400" y="108" font-family="monospace" font-size="11" fill="#c084fc" text-anchor="middle">✦ now with AI agents</text>
  <text x="400" y="168" font-family="sans-serif" font-size="40" font-weight="700" fill="#fff" text-anchor="middle">Ship secure software</text>
  <text x="400" y="210" font-family="sans-serif" font-size="40" font-weight="700" fill="url(#sl-ac)" text-anchor="middle">faster than ever</text>
  <text x="400" y="244" font-family="sans-serif" font-size="14" fill="#b8add0" text-anchor="middle">From threat model to shipped feature - one platform.</text>
  <rect x="300" y="266" width="120" height="44" rx="22" fill="url(#sl-ac)"/><text x="360" y="293" font-family="sans-serif" font-size="13" font-weight="700" fill="#100a22" text-anchor="middle">Get started</text>
  <rect x="432" y="266" width="120" height="44" rx="22" fill="none" stroke="#ffffff33"/><text x="492" y="293" font-family="sans-serif" font-size="13" fill="#e7defb" text-anchor="middle">Book a demo</text>
  <!-- feature cards -->
  <g>
    <rect x="92" y="348" width="190" height="128" rx="16" fill="#ffffff0a" stroke="#ffffff14"/><circle cx="124" cy="384" r="18" fill="url(#sl-ac)" opacity=".35"/><rect x="108" y="416" width="120" height="11" rx="5" fill="#d8cdf0"/><rect x="108" y="436" width="150" height="8" rx="4" fill="#6a6184"/><rect x="108" y="452" width="120" height="8" rx="4" fill="#6a6184"/>
    <rect x="305" y="348" width="190" height="128" rx="16" fill="#ffffff0a" stroke="#c084fc55"/><circle cx="337" cy="384" r="18" fill="url(#sl-ac)" opacity=".5"/><rect x="321" y="416" width="120" height="11" rx="5" fill="#d8cdf0"/><rect x="321" y="436" width="150" height="8" rx="4" fill="#6a6184"/><rect x="321" y="452" width="110" height="8" rx="4" fill="#6a6184"/>
    <rect x="518" y="348" width="190" height="128" rx="16" fill="#ffffff0a" stroke="#ffffff14"/><circle cx="550" cy="384" r="18" fill="url(#sl-ac)" opacity=".35"/><rect x="534" y="416" width="120" height="11" rx="5" fill="#d8cdf0"/><rect x="534" y="436" width="150" height="8" rx="4" fill="#6a6184"/><rect x="534" y="452" width="130" height="8" rx="4" fill="#6a6184"/>
  </g>
</svg>
