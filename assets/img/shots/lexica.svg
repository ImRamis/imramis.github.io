<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Grounded RAG answer UI with citations">
  <defs>
    <linearGradient id="lx-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06171f"/><stop offset="1" stop-color="#040e13"/></linearGradient>
    <linearGradient id="lx-ac" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#34d399"/></linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#lx-bg)"/>
  <rect x="0" y="0" width="800" height="40" rx="16" fill="#0b2630"/><rect x="0" y="24" width="800" height="16" fill="#0b2630"/>
  <circle cx="22" cy="20" r="5" fill="#ff5f57"/><circle cx="40" cy="20" r="5" fill="#febc2e"/><circle cx="58" cy="20" r="5" fill="#28c840"/>
  <text x="400" y="24" font-family="monospace" font-size="10" fill="#69a8b5" text-anchor="middle">lexica.ramis.me · ask your docs</text>
  <!-- main answer column -->
  <text x="24" y="78" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Ask</text>
  <rect x="24" y="88" width="520" height="34" rx="10" fill="#0a1f27" stroke="#22d3ee55"/><text x="40" y="110" font-family="sans-serif" font-size="12" fill="#bfe9f0">How do I rotate the signing keys without downtime?</text>
  <circle cx="524" cy="105" r="9" fill="url(#lx-ac)"/>
  <text x="24" y="150" font-family="sans-serif" font-size="11" fill="#69a8b5">Answer · streaming</text>
  <g font-family="sans-serif" font-size="12.5" fill="#d6eef2">
    <text x="24" y="174">Add the new key to the keyset first and mark it</text>
    <text x="24" y="196">active for signing while keeping the old key valid</text>
    <text x="24" y="218">for verification <tspan fill="#22d3ee" font-weight="700">[1]</tspan>. Roll instances so all</text>
    <text x="24" y="240">verify with both, then promote the new key and</text>
    <text x="24" y="262">retire the old after the token TTL window <tspan fill="#22d3ee" font-weight="700">[2]</tspan>.</text>
    <text x="24" y="284">Never delete a key before its tokens expire <tspan fill="#22d3ee" font-weight="700">[3]</tspan>.</text>
  </g>
  <rect x="24" y="300" width="14" height="18" rx="3" fill="#22d3ee"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
  <!-- citation chips -->
  <g font-family="monospace" font-size="10">
    <rect x="24" y="332" width="160" height="26" rx="13" fill="#22d3ee18" stroke="#22d3ee44"/><text x="40" y="349" fill="#9fe6f2">[1] key-rotation.md</text>
    <rect x="192" y="332" width="150" height="26" rx="13" fill="#22d3ee18" stroke="#22d3ee44"/><text x="208" y="349" fill="#9fe6f2">[2] auth-runbook</text>
    <rect x="350" y="332" width="150" height="26" rx="13" fill="#22d3ee18" stroke="#22d3ee44"/><text x="366" y="349" fill="#9fe6f2">[3] ADR-0042</text>
  </g>
  <!-- eval badge -->
  <rect x="24" y="372" width="520" height="40" rx="10" fill="#34d39914" stroke="#34d39933"/>
  <text x="40" y="396" font-family="monospace" font-size="11" fill="#7fe9d4">eval: faithfulness 0.94 · recall@5 0.91 · p95 480ms · grounded ✓</text>
  <rect x="24" y="426" width="520" height="50" rx="10" fill="#0a1f27" stroke="#ffffff10"/>
  <text x="40" y="447" font-family="sans-serif" font-size="10" fill="#69a8b5">Refuses on low context</text>
  <text x="40" y="463" font-family="monospace" font-size="10" fill="#9fe6f2">"I don't have enough in the docs to answer that confidently."</text>
  <!-- right rail: retrieved sources -->
  <rect x="560" y="56" width="224" height="420" rx="12" fill="#ffffff0a" stroke="#ffffff14"/>
  <text x="578" y="82" font-family="sans-serif" font-size="12" font-weight="700" fill="#fff">Retrieved · hybrid</text>
  <text x="578" y="98" font-family="monospace" font-size="9" fill="#69a8b5">dense + BM25 · re-ranked</text>
  <g font-family="sans-serif" font-size="11">
    <rect x="576" y="110" width="192" height="62" rx="9" fill="#22d3ee14" stroke="#22d3ee33"/><text x="590" y="130" fill="#d6eef2">key-rotation.md</text><text x="590" y="146" font-size="9" fill="#69a8b5">#keyset #signing</text><rect x="590" y="154" width="120" height="6" rx="3" fill="#0b2630"/><rect x="590" y="154" width="110" height="6" rx="3" fill="url(#lx-ac)"/><text x="724" y="160" font-size="9" fill="#7fe9d4">.94</text>
    <rect x="576" y="180" width="192" height="62" rx="9" fill="#ffffff08"/><text x="590" y="200" fill="#d6eef2">auth-runbook.md</text><text x="590" y="216" font-size="9" fill="#69a8b5">#tokens #ttl</text><rect x="590" y="224" width="120" height="6" rx="3" fill="#0b2630"/><rect x="590" y="224" width="92" height="6" rx="3" fill="url(#lx-ac)"/><text x="724" y="230" font-size="9" fill="#7fe9d4">.88</text>
    <rect x="576" y="250" width="192" height="62" rx="9" fill="#ffffff08"/><text x="590" y="270" fill="#d6eef2">ADR-0042.md</text><text x="590" y="286" font-size="9" fill="#69a8b5">#decision</text><rect x="590" y="294" width="120" height="6" rx="3" fill="#0b2630"/><rect x="590" y="294" width="78" height="6" rx="3" fill="url(#lx-ac)"/><text x="724" y="300" font-size="9" fill="#7fe9d4">.81</text>
    <rect x="576" y="320" width="192" height="48" rx="9" fill="#ffffff05"/><text x="590" y="340" fill="#8fb6bf">changelog-3.2.md</text><rect x="590" y="348" width="120" height="6" rx="3" fill="#0b2630"/><rect x="590" y="348" width="40" height="6" rx="3" fill="#34d39966"/><text x="724" y="354" font-size="9" fill="#69a8b5">.62</text>
  </g>
  <rect x="576" y="380" width="192" height="40" rx="9" fill="url(#lx-ac)" opacity=".16"/><text x="672" y="404" font-family="monospace" font-size="9" fill="#7fe9d4" text-anchor="middle">cross-encoder re-rank</text>
  <rect x="576" y="428" width="192" height="34" rx="9" fill="#ffffff0a"/><text x="672" y="449" font-family="monospace" font-size="9" fill="#69a8b5" text-anchor="middle">incremental re-index · fresh</text>
</svg>
