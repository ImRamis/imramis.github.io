<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Resilient .NET microservices mesh dashboard">
  <defs>
    <linearGradient id="ms-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0c1226"/><stop offset="1" stop-color="#080a16"/></linearGradient>
    <linearGradient id="ms-ac" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#818cf8"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#ms-bg)"/>
  <rect x="0" y="0" width="800" height="40" rx="16" fill="#131a32"/><rect x="0" y="24" width="800" height="16" fill="#131a32"/>
  <circle cx="22" cy="20" r="5" fill="#ff5f57"/><circle cx="40" cy="20" r="5" fill="#febc2e"/><circle cx="58" cy="20" r="5" fill="#28c840"/>
  <text x="400" y="24" font-family="monospace" font-size="10" fill="#7a85ac" text-anchor="middle">services-demo.ramis.me · mesh</text>
  <text x="24" y="78" font-family="sans-serif" font-size="17" font-weight="700" fill="#fff">.NET service mesh</text>
  <rect x="660" y="60" width="116" height="26" rx="13" fill="#34d39922"/><text x="718" y="77" font-family="sans-serif" font-size="11" fill="#34d399" text-anchor="middle">● 99.99% uptime</text>
  <!-- mesh graph -->
  <rect x="24" y="96" width="430" height="300" rx="14" fill="#ffffff0a" stroke="#ffffff14"/>
  <g stroke="#3a4a86" stroke-width="2">
    <line x1="120" y1="170" x2="240" y2="140"/><line x1="240" y1="140" x2="360" y2="180"/>
    <line x1="120" y1="170" x2="200" y2="300"/><line x1="200" y1="300" x2="340" y2="320"/>
    <line x1="240" y1="140" x2="200" y2="300"/><line x1="360" y1="180" x2="340" y2="320"/>
    <line x1="240" y1="140" x2="340" y2="320"/>
  </g>
  <g font-family="sans-serif" font-size="10" font-weight="600">
    <circle cx="120" cy="170" r="26" fill="#0b1330" stroke="#818cf8" stroke-width="2"/><text x="120" y="174" fill="#cdd3f4" text-anchor="middle">Auth</text>
    <circle cx="240" cy="140" r="26" fill="#0b1330" stroke="#38bdf8" stroke-width="2"/><text x="240" y="144" fill="#cdd3f4" text-anchor="middle">API</text>
    <circle cx="360" cy="180" r="26" fill="#0b1330" stroke="#818cf8" stroke-width="2"/><text x="360" y="184" fill="#cdd3f4" text-anchor="middle">Pay</text>
    <circle cx="200" cy="300" r="26" fill="#0b1330" stroke="#34d399" stroke-width="2"/><text x="200" y="304" fill="#cdd3f4" text-anchor="middle">Ledger</text>
    <circle cx="340" cy="320" r="26" fill="#0b1330" stroke="#fbbf24" stroke-width="2"/><text x="340" y="324" fill="#cdd3f4" text-anchor="middle">Notify</text>
  </g>
  <!-- circuit breaker chip on one edge -->
  <rect x="262" y="226" width="96" height="20" rx="10" fill="#fbbf2422"/><text x="310" y="240" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">breaker: half-open</text>
  <!-- right: resilience panel -->
  <rect x="466" y="96" width="310" height="142" rx="14" fill="#ffffff0a" stroke="#ffffff14"/>
  <text x="486" y="122" font-family="sans-serif" font-size="12" font-weight="700" fill="#fff">Resilience (Polly)</text>
  <g font-family="sans-serif" font-size="11" fill="#aeb6da">
    <text x="486" y="150">Retries</text><rect x="600" y="142" width="160" height="8" rx="4" fill="#ffffff14"/><rect x="600" y="142" width="120" height="8" rx="4" fill="url(#ms-ac)"/>
    <text x="486" y="178">Circuit breakers</text><rect x="600" y="170" width="160" height="8" rx="4" fill="#ffffff14"/><rect x="600" y="170" width="150" height="8" rx="4" fill="url(#ms-ac)"/>
    <text x="486" y="206">Bulkheads</text><rect x="600" y="198" width="160" height="8" rx="4" fill="#ffffff14"/><rect x="600" y="198" width="96" height="8" rx="4" fill="url(#ms-ac)"/>
  </g>
  <!-- right: latency stat -->
  <rect x="466" y="252" width="148" height="144" rx="14" fill="#ffffff0a" stroke="#ffffff14"/>
  <text x="540" y="280" font-family="sans-serif" font-size="11" fill="#7a85ac" text-anchor="middle">p99 latency</text>
  <text x="540" y="324" font-family="sans-serif" font-size="34" font-weight="700" fill="#fff" text-anchor="middle">118<tspan font-size="13" fill="#7a85ac">ms</tspan></text>
  <polyline points="486,372 506,360 526,366 546,348 566,356 586,340 606,350" fill="none" stroke="#34d399" stroke-width="2"/>
  <rect x="626" y="252" width="150" height="144" rx="14" fill="#ffffff0a" stroke="#ffffff14"/>
  <text x="701" y="280" font-family="sans-serif" font-size="11" fill="#7a85ac" text-anchor="middle">cascade failures</text>
  <text x="701" y="328" font-family="sans-serif" font-size="34" font-weight="700" fill="#34d399" text-anchor="middle">~0</text>
  <text x="701" y="360" font-family="monospace" font-size="9" fill="#7a85ac" text-anchor="middle">contained by breakers</text>
  <!-- footer telemetry -->
  <rect x="24" y="412" width="752" height="56" rx="12" fill="#070a14" stroke="#ffffff10"/>
  <g font-family="monospace" font-size="10" fill="#7a85ac"><text x="44" y="434"><tspan fill="#34d399">OTel</tspan>  trace 7f2a · API→Pay→Ledger  88ms  (Serilog → Datadog)</text><text x="44" y="454"><tspan fill="#818cf8">PACT</tspan>  contract verified · 0 breaking changes on boundary</text></g>
</svg>
