<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Event-driven architecture diagram">
  <defs>
    <linearGradient id="ar-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b0f24"/><stop offset="1" stop-color="#070912"/></linearGradient>
    <linearGradient id="ar-ac" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#818cf8"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <marker id="ar-arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#5b6bd6"/></marker>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#ar-bg)"/>
  <rect x="0" y="0" width="800" height="40" rx="16" fill="#121734"/><rect x="0" y="24" width="800" height="16" fill="#121734"/>
  <circle cx="22" cy="20" r="5" fill="#ff5f57"/><circle cx="40" cy="20" r="5" fill="#febc2e"/><circle cx="58" cy="20" r="5" fill="#28c840"/>
  <text x="400" y="24" font-family="monospace" font-size="10" fill="#7b85b8" text-anchor="middle">payments-platform · topology</text>
  <!-- API gateway -->
  <rect x="40" y="220" width="120" height="60" rx="12" fill="#ffffff0a" stroke="#818cf855"/><text x="100" y="246" font-family="sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">API Gateway</text><text x="100" y="266" font-family="monospace" font-size="9" fill="#7b85b8" text-anchor="middle">Spring Cloud</text>
  <!-- producers -->
  <rect x="220" y="90" width="130" height="56" rx="12" fill="#ffffff0a" stroke="#38bdf855"/><text x="285" y="114" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Order Service</text><text x="285" y="132" font-family="monospace" font-size="9" fill="#7b85b8" text-anchor="middle">Spring Boot 3</text>
  <rect x="220" y="222" width="130" height="56" rx="12" fill="#ffffff0a" stroke="#38bdf855"/><text x="285" y="246" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Payment Service</text><text x="285" y="264" font-family="monospace" font-size="9" fill="#7b85b8" text-anchor="middle">outbox + idempotent</text>
  <rect x="220" y="354" width="130" height="56" rx="12" fill="#ffffff0a" stroke="#38bdf855"/><text x="285" y="378" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Ledger Service</text><text x="285" y="396" font-family="monospace" font-size="9" fill="#7b85b8" text-anchor="middle">Kafka Streams</text>
  <!-- kafka -->
  <rect x="420" y="180" width="120" height="140" rx="14" fill="url(#ar-ac)" opacity=".16" stroke="#818cf8"/><text x="480" y="234" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Apache</text><text x="480" y="256" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Kafka</text><text x="480" y="280" font-family="monospace" font-size="9" fill="#aeb6e6" text-anchor="middle">exactly-once</text>
  <!-- consumers -->
  <rect x="610" y="120" width="150" height="54" rx="12" fill="#ffffff0a" stroke="#34d39955"/><text x="685" y="143" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Notification</text><text x="685" y="161" font-family="monospace" font-size="9" fill="#7b85b8" text-anchor="middle">consumer group</text>
  <rect x="610" y="222" width="150" height="54" rx="12" fill="#ffffff0a" stroke="#34d39955"/><text x="685" y="245" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">PostgreSQL</text><text x="685" y="263" font-family="monospace" font-size="9" fill="#7b85b8" text-anchor="middle">JPA / Hibernate</text>
  <rect x="610" y="324" width="150" height="54" rx="12" fill="#ffffff0a" stroke="#34d39955"/><text x="685" y="347" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Analytics sink</text><text x="685" y="365" font-family="monospace" font-size="9" fill="#7b85b8" text-anchor="middle">stream → warehouse</text>
  <!-- arrows -->
  <g stroke="#5b6bd6" stroke-width="2" fill="none" marker-end="url(#ar-arrow)">
    <path d="M160 240 L214 118"/><path d="M160 250 L214 250"/><path d="M160 260 L214 382"/>
    <path d="M350 118 L416 200"/><path d="M350 250 L414 250"/><path d="M350 382 L416 300"/>
    <path d="M540 230 L604 147"/><path d="M540 250 L604 249"/><path d="M540 270 L604 351"/>
  </g>
  <rect x="40" y="430" width="720" height="40" rx="11" fill="#ffffff08"/><text x="56" y="455" font-family="monospace" font-size="11" fill="#7b85b8">50K+ daily txns · 88% coverage (JUnit5 · TestContainers · PACT) · −65% incidents · AWS EKS / Helm</text>
</svg>
