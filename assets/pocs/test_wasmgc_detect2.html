<!DOCTYPE html>
<html><body>
<div id="out">Testing...</div>
<script>
const results = [];

// Test 1: Basic WASM
try {
  new WebAssembly.Module(new Uint8Array([0,97,115,109,1,0,0,0]));
  results.push("WASM: SUPPORTED");
} catch(e) {
  results.push("WASM: NO - " + e.message);
}

// Test 2: WasmGC struct type (corrected section length)
try {
  const bytes = new Uint8Array([
    0x00, 0x61, 0x73, 0x6d, // magic
    0x01, 0x00, 0x00, 0x00, // version 1
    0x01,                   // type section id
    0x05,                   // section body length = 5 bytes
    0x01,                   // 1 type
    0x5f,                   // struct composite type
    0x01,                   // 1 field
    0x7f,                   // i32
    0x01,                   // mutable
  ]);
  new WebAssembly.Module(bytes);
  results.push("WasmGC Struct: SUPPORTED");
} catch(e) {
  results.push("WasmGC Struct: NO - " + e.message);
}

// Test 3: WasmGC array type (corrected section length)
try {
  const bytes = new Uint8Array([
    0x00, 0x61, 0x73, 0x6d,
    0x01, 0x00, 0x00, 0x00,
    0x01,                   // type section id
    0x04,                   // section body length = 4 bytes
    0x01,                   // 1 type
    0x5e,                   // array composite type
    0x7f,                   // i32 element type
    0x01,                   // mutable
  ]);
  new WebAssembly.Module(bytes);
  results.push("WasmGC Array: SUPPORTED");
} catch(e) {
  results.push("WasmGC Array: NO - " + e.message);
}

// Test 4: Memory64 (corrected encoding - no max, i64 index)
try {
  const bytes = new Uint8Array([
    0x00, 0x61, 0x73, 0x6d,
    0x01, 0x00, 0x00, 0x00,
    0x05,                   // memory section id
    0x03,                   // section body length = 3 bytes
    0x01,                   // 1 memory
    0x04,                   // flags: memory64, no max
    0x01,                   // initial = 1 page (LEB128)
  ]);
  new WebAssembly.Module(bytes);
  results.push("Memory64: SUPPORTED");
} catch(e) {
  results.push("Memory64: NO - " + e.message);
}

// Test 5: JS API checks
results.push("WebAssembly.Tag: " + typeof WebAssembly.Tag);
results.push("WebAssembly.Exception: " + typeof WebAssembly.Exception);
results.push("SharedArrayBuffer: " + typeof SharedArrayBuffer);
results.push("Atomics: " + typeof Atomics);

// Test 6: Chrome version
const match = navigator.userAgent.match(/Chrome\/([0-9.]+)/);
results.push("Chrome: " + (match ? match[1] : "unknown"));

document.getElementById('out').innerText = results.join('\n');
</script>
</body></html>
