const sleep = ms => new Promise(r => setTimeout(r, ms));

// ============================================================
// 1. window.opener Property Leaks
// ============================================================
async function testWindowOpener() {
  startGroup('1. window.opener Property Leaks');

  // Test if we can access properties of a window we opened
  try {
    const win = window.open(getUrl(), '_blank', 'width=100,height=100');
    if (!win) {
      log('INFO', 'Popup blocked — enable popups to test');
      return;
    }

    await sleep(2000);

    // Test accessible cross-origin properties
    const tests = [
      { prop: 'closed', desc: 'window.closed' },
      { prop: 'length', desc: 'window.length (frame count)' },
      { prop: 'opener', desc: 'window.opener' },
      { prop: 'self', desc: 'window.self' },
    ];

    for (const t of tests) {
      try {
        const val = win[t.prop];
        log('SUSPICIOUS', `${t.desc} readable cross-origin: ${val}`);
      } catch (e) {
        log('SAFE', `${t.desc} blocked: ${e.message}`);
      }
    }

    // Test blocked properties
    const blocked = ['document', 'location.href', 'location.pathname',
                     'localStorage', 'sessionStorage', 'cookie',
                     'innerWidth', 'innerHeight', 'name'];
    for (const prop of blocked) {
      try {
        let val;
        if (prop.includes('.')) {
          const parts = prop.split('.');
          val = win[parts[0]][parts[1]];
        } else {
          val = win[prop];
        }
        if (val !== undefined && val !== '') {
          log('VULNERABLE', `${prop} readable cross-origin: ${JSON.stringify(val).substring(0, 100)}`);
        } else {
          log('SAFE', `${prop} returned empty/undefined`);
        }
      } catch (e) {
        log('SAFE', `${prop} blocked: ${e.constructor.name}`);
      }
    }

    // Test if opener can be nullified (COOP behavior)
    try {
      const openerVal = win.opener;
      log('INFO', `Opened window's opener is ${openerVal === null ? 'null (COOP active)' : 'set'}`);
    } catch (e) {}

    win.close();
  } catch (e) {
    log('INFO', `Opener test error: ${e.message}`);
  }
}

// ============================================================
// 2. Cross-Origin window.name Persistence
// ============================================================
async function testWindowName() {
  startGroup('2. Cross-Origin window.name Persistence');

  // window.name persists across navigations in the same tab/frame
  try {
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    // Set name on same-origin page
    iframe.contentWindow.name = 'XSLEAK_TEST_' + Math.random().toString(36);
    const setName = iframe.contentWindow.name;
    log('INFO', `Set window.name: ${setName}`);

    // Navigate to cross-origin
    iframe.src = getUrl();
    await sleep(2000);

    // Navigate back to same-origin blank
    iframe.src = 'about:blank';
    await sleep(500);

    // Check if name persisted
    try {
      const readName = iframe.contentWindow.name;
      if (readName === setName) {
        log('SUSPICIOUS',
          `window.name persisted across cross-origin navigation: "${readName}"`);
      } else if (readName === '') {
        log('SAFE', 'window.name cleared on cross-origin navigation');
      } else {
        log('SUSPICIOUS', `window.name changed to: "${readName}"`);
      }
    } catch (e) {
      log('SAFE', `Cannot read window.name after cross-origin nav: ${e.message}`);
    }

    document.body.removeChild(iframe);
  } catch (e) {
    log('INFO', `window.name test error: ${e.message}`);
  }
}

// ============================================================
// 3. CSS Containment Leak
// ============================================================
async function testCSSContainment() {
  startGroup('3. CSS Containment Information Leak');

  try {
    // Test if cross-origin iframe dimensions can be inferred via CSS containment
    const iframe = document.createElement('iframe');
    iframe.src = getUrl();
    iframe.style.cssText = 'contain: strict; width: auto; height: auto; position: absolute; visibility: hidden;';
    document.body.appendChild(iframe);
    
    await sleep(2000);

    // Try to measure iframe dimensions
    const rect = iframe.getBoundingClientRect();
    log('INFO', `Cross-origin iframe dimensions: ${rect.width}x${rect.height}`);

    // Test resize observer on cross-origin iframe
    try {
      const ro = new ResizeObserver(entries => {
        for (const entry of entries) {
          log('SUSPICIOUS',
            `ResizeObserver detected cross-origin iframe resize: ${entry.contentRect.width}x${entry.contentRect.height}`);
        }
      });
      ro.observe(iframe);
      await sleep(1000);
      ro.disconnect();
    } catch (e) {
      log('INFO', `ResizeObserver: ${e.message}`);
    }

    // Test IntersectionObserver
    try {
      const io = new IntersectionObserver(entries => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            log('INFO',
              `IntersectionObserver: ratio=${entry.intersectionRatio.toFixed(2)}`);
          }
        }
      });
      iframe.style.visibility = 'visible';
      iframe.style.position = 'relative';
      io.observe(iframe);
      await sleep(500);
      io.disconnect();
      iframe.style.visibility = 'hidden';
      iframe.style.position = 'absolute';
    } catch (e) {}

    document.body.removeChild(iframe);
  } catch (e) {
    log('INFO', `CSS containment test error: ${e.message}`);
  }
}

// ============================================================
// 4. Cross-Origin Pixel Reading via Canvas
// ============================================================
async function testCanvasPixelReading() {
  startGroup('4. Canvas Cross-Origin Pixel Reading');

  const canvas = document.getElementById('testCanvas');
  const ctx = canvas.getContext('2d');

  // Test 1: Draw cross-origin image and try to read pixels
  try {
    const img = new Image();
    img.crossOrigin = ''; // Try CORS

    const loadPromise = new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
      setTimeout(reject, 5000);
    });

    img.src = getImage();

    try {
      await loadPromise;
      ctx.drawImage(img, 0, 0);

      try {
        const pixel = ctx.getImageData(0, 0, 1, 1);
        log('SUSPICIOUS',
          `Read cross-origin pixel: rgba(${pixel.data[0]},${pixel.data[1]},${pixel.data[2]},${pixel.data[3]})`);
      } catch (e) {
        if (e.name === 'SecurityError') {
          log('SAFE', 'Canvas tainted — getImageData blocked (SecurityError)');
        } else {
          log('INFO', `Canvas pixel read: ${e.message}`);
        }
      }

      // Test toDataURL on tainted canvas
      try {
        const dataUrl = canvas.toDataURL();
        if (dataUrl.length > 100) {
          log('SUSPICIOUS', `toDataURL succeeded on tainted canvas (${dataUrl.length} chars)`);
        }
      } catch (e) {
        log('SAFE', `toDataURL blocked on tainted canvas: ${e.name}`);
      }

      // Test toBlob
      try {
        await new Promise((resolve, reject) => {
          canvas.toBlob(blob => {
            if (blob) {
              log('SUSPICIOUS', `toBlob succeeded on tainted canvas (${blob.size} bytes)`);
            }
            resolve();
          });
          setTimeout(reject, 1000);
        });
      } catch (e) {
        log('SAFE', `toBlob blocked: ${e.name || e.message}`);
      }
    } catch (e) {
      log('INFO', `Cross-origin image load failed: ${e.type || e.message}`);
    }
  } catch (e) {
    log('INFO', `Canvas test error: ${e.message}`);
  }

  // Test 2: SVG foreignObject pixel extraction attempt
  try {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const svgData = `
      <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
        <foreignObject width="200" height="200">
          <body xmlns="http://www.w3.org/1999/xhtml">
            <img src="${getImage()}" width="200" height="200"/>
          </body>
        </foreignObject>
      </svg>`;

    const svgBlob = new Blob([svgData], { type: 'image/svg+xml' });
    const svgUrl = URL.createObjectURL(svgBlob);
    
    const svgImg = new Image();
    const svgLoad = new Promise((resolve, reject) => {
      svgImg.onload = resolve;
      svgImg.onerror = reject;
      setTimeout(reject, 3000);
    });
    svgImg.src = svgUrl;

    try {
      await svgLoad;
      ctx.drawImage(svgImg, 0, 0);
      const pixel = ctx.getImageData(0, 0, 1, 1);
      log('SUSPICIOUS', 'SVG foreignObject bypass — pixel readable');
    } catch (e) {
      log('SAFE', `SVG foreignObject pixel extraction blocked: ${e.name || e.message}`);
    }

    URL.revokeObjectURL(svgUrl);
  } catch (e) {
    log('INFO', `SVG test: ${e.message}`);
  }

  // Test 3: OffscreenCanvas
  try {
    if (typeof OffscreenCanvas !== 'undefined') {
      const offscreen = new OffscreenCanvas(100, 100);
      const offCtx = offscreen.getContext('2d');
      
      const img = new Image();
      const loaded = new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        setTimeout(reject, 3000);
      });
      img.src = getImage();

      try {
        await loaded;
        offCtx.drawImage(img, 0, 0);
        const px = offCtx.getImageData(0, 0, 1, 1);
        log('SUSPICIOUS', 'OffscreenCanvas read cross-origin pixels');
      } catch (e) {
        log('SAFE', `OffscreenCanvas tainted: ${e.name}`);
      }
    }
  } catch (e) {}
}

// ============================================================
// 5. WebGL Shader Timing Attacks
// ============================================================
async function testWebGLShaderTiming() {
  startGroup('5. WebGL Shader Timing Attacks');

  try {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

    if (!gl) {
      log('INFO', 'WebGL not available');
      return;
    }

    // Test 1: Load cross-origin texture and try to read framebuffer
    try {
      const img = new Image();
      img.crossOrigin = '';
      const loaded = new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        setTimeout(reject, 3000);
      });
      img.src = getImage();

      try {
        await loaded;
        const texture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, texture);
        
        try {
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);

          // Set up minimal render pipeline
          const vs = gl.createShader(gl.VERTEX_SHADER);
          gl.shaderSource(vs, `
            attribute vec4 position;
            varying vec2 uv;
            void main() {
              gl_Position = position;
              uv = position.xy * 0.5 + 0.5;
            }
          `);
          gl.compileShader(vs);

          const fs = gl.createShader(gl.FRAGMENT_SHADER);
          gl.shaderSource(fs, `
            precision mediump float;
            varying vec2 uv;
            uniform sampler2D tex;
            void main() {
              gl_FragColor = texture2D(tex, uv);
            }
          `);
          gl.compileShader(fs);

          const prog = gl.createProgram();
          gl.attachShader(prog, vs);
          gl.attachShader(prog, fs);
          gl.linkProgram(prog);
          gl.useProgram(prog);

          // Draw quad
          const buf = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, buf);
          gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
          const pos = gl.getAttribLocation(prog, 'position');
          gl.enableVertexAttribArray(pos);
          gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

          // Try to read pixels
          const pixels = new Uint8Array(4);
          gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
          
          if (pixels[3] > 0) {
            log('SUSPICIOUS',
              `WebGL read cross-origin pixels: rgba(${pixels[0]},${pixels[1]},${pixels[2]},${pixels[3]})`);
          } else {
            log('SAFE', 'WebGL readPixels returned zeros (origin-clean flag enforced)');
          }
        } catch (e) {
          log('SAFE', `WebGL cross-origin texture blocked: ${e.message}`);
        }

        gl.deleteTexture(texture);
      } catch (e) {
        log('INFO', `WebGL texture test: ${e.type || e.message}`);
      }
    } catch (e) {}

    // Test 2: Shader compilation timing
    try {
      const shaders = [
        { name: 'simple', code: 'precision mediump float;\nvoid main() { gl_FragColor = vec4(1.0); }' },
        { name: 'complex', code: `precision mediump float;
          void main() {
            vec4 c = vec4(0.0);
            for (int i = 0; i < 100; i++) {
              c += vec4(sin(float(i)), cos(float(i)), tan(float(i)), 1.0);
            }
            gl_FragColor = normalize(c);
          }` },
      ];

      for (const s of shaders) {
        const start = performance.now();
        const shader = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(shader, s.code);
        gl.compileShader(shader);
        const compiled = gl.getShaderParameter(shader, gl.COMPILE_STATUS);
        const elapsed = performance.now() - start;
        
        log('INFO', `Shader "${s.name}" compile: ${elapsed.toFixed(2)}ms (${compiled ? 'success' : 'failed'})`);
        gl.deleteShader(shader);
      }
    } catch (e) {}

    // Test 3: WebGL renderer info
    try {
      const ext = gl.getExtension('WEBGL_debug_renderer_info');
      if (ext) {
        const vendor = gl.getParameter(ext.UNMASKED_VENDOR_WEBGL);
        const renderer = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
        log('SUSPICIOUS', `WebGL renderer leak: ${vendor} / ${renderer}`);
      } else {
        log('SAFE', 'WEBGL_debug_renderer_info not available');
      }
    } catch (e) {
      log('INFO', `WebGL renderer info: ${e.message}`);
    }

    gl.getExtension('WEBGL_lose_context')?.loseContext();
  } catch (e) {
    log('INFO', `WebGL test error: ${e.message}`);
  }
}

// ============================================================
// 6. AudioContext Fingerprinting
// ============================================================
async function testAudioFingerprint() {
  startGroup('6. AudioContext Fingerprinting');

  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) {
      log('INFO', 'AudioContext not available');
      return;
    }

    const ctx = new AudioCtx();
    
    // Test 1: OscillatorNode + DynamicsCompressor fingerprint
    try {
      const oscillator = ctx.createOscillator();
      const compressor = ctx.createDynamicsCompressor();
      const analyser = ctx.createAnalyser();

      oscillator.type = 'triangle';
      oscillator.frequency.value = 10000;

      compressor.threshold.value = -50;
      compressor.knee.value = 40;
      compressor.ratio.value = 12;
      compressor.attack.value = 0;
      compressor.release.value = 0.25;

      oscillator.connect(compressor);
      compressor.connect(analyser);
      analyser.connect(ctx.destination);

      oscillator.start(0);
      
      await sleep(100);

      // Read frequency data
      const freqData = new Float32Array(analyser.frequencyBinCount);
      analyser.getFloatFrequencyData(freqData);

      // Generate fingerprint hash from audio data
      let hash = 0;
      for (let i = 0; i < freqData.length; i++) {
        if (!isNaN(freqData[i]) && isFinite(freqData[i])) {
          hash = ((hash << 5) - hash + Math.round(freqData[i] * 1000)) | 0;
        }
      }

      oscillator.stop();
      oscillator.disconnect();
      compressor.disconnect();
      analyser.disconnect();

      log('SUSPICIOUS',
        `AudioContext fingerprint hash: ${hash} (unique per browser/OS/hardware)`);
    } catch (e) {
      log('INFO', `Audio fingerprint: ${e.message}`);
    }

    // Test 2: OfflineAudioContext rendering
    try {
      const offlineCtx = new OfflineAudioContext(1, 44100, 44100);
      const osc = offlineCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 1000;
      osc.connect(offlineCtx.destination);
      osc.start();

      const buffer = await offlineCtx.startRendering();
      const data = buffer.getChannelData(0);

      // Compute simple hash of rendered audio
      let sum = 0;
      for (let i = 0; i < data.length; i++) {
        sum += Math.abs(data[i]);
      }

      log('SUSPICIOUS',
        `OfflineAudioContext fingerprint sum: ${sum.toFixed(6)} (hardware-dependent)`);
    } catch (e) {
      log('INFO', `OfflineAudio: ${e.message}`);
    }

    // Test 3: AudioContext properties that leak info
    const props = {
      sampleRate: ctx.sampleRate,
      baseLatency: ctx.baseLatency,
      outputLatency: ctx.outputLatency,
      state: ctx.state,
    };

    log('INFO', `AudioContext: sampleRate=${props.sampleRate}, baseLatency=${props.baseLatency?.toFixed(4)}, outputLatency=${props.outputLatency?.toFixed(4)}`);

    if (ctx.baseLatency !== undefined) {
      log('SUSPICIOUS', 'AudioContext baseLatency available for fingerprinting');
    }

    ctx.close();
  } catch (e) {
    log('INFO', `AudioContext test error: ${e.message}`);
  }
}

// ============================================================
// 7. Performance API Cross-Origin Entries
// ============================================================
async function testPerformanceEntries() {
  startGroup('7. Performance API Cross-Origin Entries');

  // Load some cross-origin resources
  const urls = [
    getUrl(),
    getImage(),
    getOrigin() + '/api/test?t=' + Date.now(),
  ];

  for (const url of urls) {
    try {
      await fetch(url, { mode: 'no-cors', cache: 'no-store' });
    } catch (e) {}
  }

  await sleep(500);

  // Check Resource Timing entries
  const entries = performance.getEntriesByType('resource');
  for (const entry of entries) {
    try {
      const u = new URL(entry.name);
      if (u.origin !== location.origin) {
        const hasDetailedTiming = entry.requestStart > 0;
        const hasSizeInfo = entry.transferSize > 0;

        if (hasDetailedTiming) {
          log('SUSPICIOUS',
            `Detailed timing for ${u.pathname}: DNS=${(entry.domainLookupEnd - entry.domainLookupStart).toFixed(1)}ms, TCP=${(entry.connectEnd - entry.connectStart).toFixed(1)}ms`);
        }
        if (hasSizeInfo) {
          log('SUSPICIOUS',
            `Size info for ${u.pathname}: transfer=${entry.transferSize}, encoded=${entry.encodedBodySize}`);
        }
        if (!hasDetailedTiming && !hasSizeInfo) {
          log('SAFE', `${u.pathname}: timing/size properly zeroed`);
        }
      }
    } catch (e) {}
  }

  // Test PerformanceObserver for cross-origin leaks
  try {
    await new Promise((resolve) => {
      const observer = new PerformanceObserver((list) => {
        for (const entry of list.getEntries()) {
          if (entry.entryType === 'resource') {
            try {
              const u = new URL(entry.name);
              if (u.origin !== location.origin) {
                log('INFO', `PerformanceObserver cross-origin entry: ${u.pathname} (${entry.duration.toFixed(1)}ms)`);
              }
            } catch (e) {}
          }
        }
      });
      observer.observe({ entryTypes: ['resource'] });

      // Trigger a load
      const img = new Image();
      img.src = getImage() + '?po=' + Date.now();
      setTimeout(() => {
        observer.disconnect();
        resolve();
      }, 2000);
    });
  } catch (e) {
    log('INFO', `PerformanceObserver: ${e.message}`);
  }
}

// ============================================================
// 8. Cross-Origin Redirect Detection
// ============================================================
async function testRedirectDetection() {
  startGroup('8. Cross-Origin Redirect Detection');

  const url = getUrl();

  // Test 1: Detect redirect via fetch
  try {
    const resp = await fetch(url, { mode: 'no-cors', redirect: 'follow' });
    log('INFO', `Fetch response type: ${resp.type}, URL: ${resp.url || '(opaque)'}, redirected: ${resp.redirected}`);

    if (resp.redirected) {
      log('SUSPICIOUS', `Cross-origin redirect detected via fetch.redirected`);
    }
    if (resp.url && resp.url !== url) {
      log('SUSPICIOUS', `Redirect destination leaked: ${resp.url}`);
    }
  } catch (e) {
    log('INFO', `Fetch redirect test: ${e.message}`);
  }

  // Test 2: Detect redirect via <script> tag error
  try {
    const result = await new Promise((resolve) => {
      const script = document.createElement('script');
      const testUrl = url + '?redirect_test=' + Date.now();

      script.onload = () => {
        document.head.removeChild(script);
        resolve({ event: 'load', hadRedirect: false });
      };
      script.onerror = (e) => {
        document.head.removeChild(script);
        resolve({ event: 'error', hadRedirect: false });
      };

      setTimeout(() => {
        try { document.head.removeChild(script); } catch(e) {}
        resolve({ event: 'timeout' });
      }, 5000);

      script.src = testUrl;
      document.head.appendChild(script);
    });

    log('INFO', `Script redirect probe: event=${result.event}`);
  } catch (e) {}

  // Test 3: Detect redirect via Content-Type inference
  try {
    const embedTests = ['img', 'script', 'link', 'video', 'audio'];
    for (const tag of embedTests) {
      const el = document.createElement(tag);
      if (tag === 'link') {
        el.rel = 'stylesheet';
        el.href = url + `?type_test_${tag}=` + Date.now();
      } else {
        el.src = url + `?type_test_${tag}=` + Date.now();
      }

      const result = await new Promise(resolve => {
        el.onload = () => resolve('load');
        el.onerror = () => resolve('error');
        setTimeout(() => resolve('timeout'), 3000);
        if (tag === 'link') document.head.appendChild(el);
        else document.body.appendChild(el);
      });

      try { el.parentNode?.removeChild(el); } catch (e) {}
      log('INFO', `<${tag}> probe: ${result}`);
    }
  } catch (e) {
    log('INFO', `Content-Type inference: ${e.message}`);
  }
}

// ============================================================
// 9. ContentDocument Access Attempts
// ============================================================
async function testContentDocumentAccess() {
  startGroup('9. Cross-Origin ContentDocument Access');

  // Test 1: iframe contentDocument
  try {
    const iframe = document.createElement('iframe');
    iframe.src = getUrl();
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    
    await sleep(2000);

    try {
      const doc = iframe.contentDocument;
      if (doc) {
        log('VULNERABLE', `Cross-origin contentDocument accessible!`);
        try {
          log('VULNERABLE', `Document title: ${doc.title}`);
          log('VULNERABLE', `Cookies: ${doc.cookie}`);
        } catch (e) {}
      } else {
        log('SAFE', 'Cross-origin contentDocument returns null');
      }
    } catch (e) {
      log('SAFE', `contentDocument blocked: ${e.name}`);
    }

    // Try contentWindow properties
    try {
      const win = iframe.contentWindow;
      if (win) {
        // These should be accessible per spec
        const accessible = ['postMessage', 'close', 'closed', 'focus', 'blur', 'length'];
        for (const prop of accessible) {
          try {
            const val = typeof win[prop] === 'function' ? 'function' : win[prop];
            log('INFO', `iframe.contentWindow.${prop}: ${val}`);
          } catch (e) {
            log('SAFE', `contentWindow.${prop} blocked: ${e.name}`);
          }
        }

        // These should be blocked
        const blocked = ['document', 'localStorage', 'location.href',
                        'location.pathname', 'location.search'];
        for (const prop of blocked) {
          try {
            let val;
            if (prop.includes('.')) {
              const [a, b] = prop.split('.');
              val = win[a][b];
            } else {
              val = win[prop];
            }
            log('VULNERABLE', `contentWindow.${prop} readable: ${String(val).substring(0, 50)}`);
          } catch (e) {
            log('SAFE', `contentWindow.${prop} blocked: ${e.name}`);
          }
        }
      }
    } catch (e) {
      log('SAFE', `contentWindow access blocked: ${e.name}`);
    }

    document.body.removeChild(iframe);
  } catch (e) {
    log('INFO', `ContentDocument test error: ${e.message}`);
  }

  // Test 2: Object/embed contentDocument
  try {
    const obj = document.createElement('object');
    obj.data = getUrl();
    obj.type = 'text/html';
    obj.style.display = 'none';
    document.body.appendChild(obj);
    
    await sleep(2000);

    try {
      const doc = obj.contentDocument;
      if (doc) {
        log('VULNERABLE', 'Object contentDocument accessible cross-origin!');
      } else {
        log('SAFE', 'Object contentDocument returns null');
      }
    } catch (e) {
      log('SAFE', `Object contentDocument blocked: ${e.name}`);
    }

    document.body.removeChild(obj);
  } catch (e) {}

  // Test 3: window.frames enumeration
  try {
    const iframe1 = document.createElement('iframe');
    iframe1.src = getUrl();
    iframe1.name = 'xoleak_frame_1';
    iframe1.style.display = 'none';
    document.body.appendChild(iframe1);
    
    await sleep(1000);

    log('INFO', `window.frames.length: ${window.frames.length}`);
    
    for (let i = 0; i < window.frames.length; i++) {
      try {
        const frame = window.frames[i];
        try {
          const loc = frame.location.href;
          log('VULNERABLE', `Frame ${i} location readable: ${loc}`);
        } catch (e) {
          log('SAFE', `Frame ${i} location blocked`);
        }
        try {
          const name = frame.name;
          log('INFO', `Frame ${i} name: "${name}"`);
        } catch (e) {
          log('SAFE', `Frame ${i} name blocked`);
        }
      } catch (e) {}
    }

    document.body.removeChild(iframe1);
  } catch (e) {}
}

// ============================================================
// Main Runner
// ============================================================
async function runAllTests() {
  document.getElementById('results').innerHTML = '';
  const start = performance.now();

  const tests = [
    ['window.opener Leaks', testWindowOpener],
    ['window.name Persistence', testWindowName],
    ['CSS Containment', testCSSContainment],
    ['Canvas Pixel Reading', testCanvasPixelReading],
    ['WebGL Shader Timing', testWebGLShaderTiming],
    ['AudioContext Fingerprinting', testAudioFingerprint],
    ['Performance API Entries', testPerformanceEntries],
    ['Redirect Detection', testRedirectDetection],
    ['ContentDocument Access', testContentDocumentAccess],
  ];

  for (let i = 0; i < tests.length; i++) {
    setProgress(`Running ${i + 1}/${tests.length}: ${tests[i][0]}...`);
    try { await tests[i][1](); } catch (e) {
      log('INFO', `Test "${tests[i][0]}" error: ${e.message}`);
    }
    await sleep(200);
  }

  const elapsed = ((performance.now() - start) / 1000).toFixed(1);
  setProgress(`Complete in ${elapsed}s`);

  startGroup('Summary');
  let safe = 0, suspicious = 0, vulnerable = 0;
  document.querySelectorAll('.result').forEach(r => {
    if (r.classList.contains('SAFE')) safe++;
    if (r.classList.contains('SUSPICIOUS')) suspicious++;
    if (r.classList.contains('VULNERABLE')) vulnerable++;
  });
  log('INFO', `🟢 SAFE: ${safe} | 🟡 SUSPICIOUS: ${suspicious} | 🔴 VULNERABLE: ${vulnerable}`);
}
