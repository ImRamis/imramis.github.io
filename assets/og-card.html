<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
    background: radial-gradient(120% 90% at 80% -10%, rgba(255,77,109,.22), transparent 55%),
                radial-gradient(100% 90% at 10% 110%, rgba(139,123,255,.22), transparent 55%),
                #07080d;
    color: #eef1f8; overflow: hidden; position: relative;
  }
  .grid { position: absolute; inset: 0;
    background-image: linear-gradient(to right, rgba(255,255,255,.05) 1px, transparent 1px),
                      linear-gradient(to bottom, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 0%, #000 10%, transparent 70%); }
  .wrap { position: relative; padding: 76px 84px; height: 100%; display: flex; flex-direction: column; justify-content: center; }
  .badge { display: inline-flex; align-items: center; gap: 12px; align-self: flex-start;
    font-family: "JetBrains Mono", monospace; font-size: 19px; letter-spacing: 3px; text-transform: uppercase;
    color: #aab2c5; padding: 12px 22px; border: 1px solid rgba(255,255,255,.14); border-radius: 999px; background: rgba(255,255,255,.04); margin-bottom: 34px; }
  .dot { width: 13px; height: 13px; border-radius: 50%; background: #34d399; box-shadow: 0 0 16px #34d399; }
  h1 { font-size: 116px; line-height: .96; letter-spacing: -3px; font-weight: 800; }
  h1 .g { background: linear-gradient(100deg, #ff4d6d, #ff9a3d 40%, #8b7bff); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .role { font-family: "JetBrains Mono", monospace; font-size: 30px; color: #6ee7ff; margin-top: 26px; letter-spacing: .5px; }
  .chips { display: flex; gap: 14px; margin-top: 40px; flex-wrap: wrap; }
  .chip { font-size: 22px; font-weight: 600; padding: 12px 22px; border-radius: 999px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); color: #cdd3e0; }
  .foot { position: absolute; bottom: 56px; left: 84px; right: 84px; display: flex; align-items: center; justify-content: space-between; }
  .url { font-family: "JetBrains Mono", monospace; font-size: 26px; color: #8b93a7; }
  .lenses { display: flex; gap: 14px; }
  .l { width: 30px; height: 30px; border-radius: 9px; }
  .mark { position: absolute; top: 64px; right: 84px; width: 78px; height: 78px; border-radius: 22px;
    display: grid; place-items: center; font-size: 34px; font-weight: 800; color: #07080d;
    background: linear-gradient(135deg, #6ee7ff, #8b7bff); }
</style></head>
<body>
  <div class="grid"></div>
  <div class="mark">MR</div>
  <div class="wrap">
    <span class="badge"><span class="dot"></span> Available for work · Nottingham, UK</span>
    <h1>Muhammad <span class="g">Ramis</span></h1>
    <div class="role">Penetration Tester × Security-Minded Engineer</div>
    <div class="chips">
      <span class="chip">OSCP+</span>
      <span class="chip">51 bug-bounty findings</span>
      <span class="chip">MSc Distinction</span>
      <span class="chip">10+ years · Java · AI · UX</span>
    </div>
  </div>
  <div class="foot">
    <span class="url">ramis.me</span>
    <span class="lenses">
      <span class="l" style="background:#ff4d6d"></span>
      <span class="l" style="background:#818cf8"></span>
      <span class="l" style="background:#34d399"></span>
      <span class="l" style="background:#fb7185"></span>
    </span>
  </div>
</body></html>
